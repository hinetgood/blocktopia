name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    tags:
      - "ios-v*"

jobs:
  build-and-upload:
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      BUNDLE_ID: com.blocktopia.app
      XCODE_WORKSPACE: ios/App/App.xcworkspace
      XCODE_SCHEME: App
      ARCHIVE_PATH: ${{ runner.temp }}/App.xcarchive
      EXPORT_PATH: ${{ runner.temp }}/export
      EXPORT_OPTIONS_PATH: ${{ runner.temp }}/ExportOptions.plist
      API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Write App Store Connect API Key
        env:
          APPSTORE_API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
        run: |
          python3 - <<'PY'
          import base64, os, pathlib
          raw = os.environ["APPSTORE_API_KEY_BASE64"].strip()
          key_path = pathlib.Path(os.environ["API_KEY_PATH"])
          key_path.write_bytes(base64.b64decode(raw))
          print(f"Wrote API key: {key_path}")
          PY

      - name: Create export options
        run: |
          cat > "$EXPORT_OPTIONS_PATH" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive
        run: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.APPSTORE_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_ISSUER_ID }}" \
            CODE_SIGN_STYLE=Automatic \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            clean archive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.APPSTORE_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_ISSUER_ID }}"

      - name: Upload to TestFlight
        run: |
          IPA_FILE=$(find "$EXPORT_PATH" -maxdepth 1 -name "*.ipa" | head -n 1)
          if [ -z "$IPA_FILE" ]; then
            echo "No IPA file found in $EXPORT_PATH"
            exit 1
          fi
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"
