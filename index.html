  // Only works inside Capacitor native app
  if (typeof Capacitor === 'undefined' || !Capacitor.Plugins?.AdMob) return;
  const { AdMob } = Capacitor.Plugins;
  try {
    await AdMob.initialize({ initializeForTesting: true });
    _prepareRewardedAd();
  } catch(e) { console.warn('AdMob init failed:', e); }
}

async function _prepareRewardedAd() {
  if (typeof Capacitor === 'undefined' || !Capacitor.Plugins?.AdMob) return;
  const { AdMob } = Capacitor.Plugins;
  const platform = Capacitor.getPlatform();
  const adId = platform === 'ios' ? AD_CONFIG.rewarded.ios : AD_CONFIG.rewarded.android;
  try {
    await AdMob.prepareRewardVideoAd({ adId });
    _adReady = true;
  } catch(e) { _adReady = false; }
}

async function showRewardedAd() {
  if (typeof Capacitor === 'undefined' || !Capacitor.Plugins?.AdMob) return false;
  const { AdMob } = Capacitor.Plugins;
  try {
    const result = await AdMob.showRewardVideoAd();
    _adReady = false;
    _prepareRewardedAd(); // preload next one

async function fetchLeaderboard() {
  if (!db) return;
  const now = Date.now();
  if (lbLoading || (now - lbLastFetch < 15000)) return; // 15s cache
  lbLoading = true;
  try {
    const snap = await db.collection('leaderboard')
      .orderBy('score', 'desc')
      .limit(20)
      .get();
    leaderboardData = [];
    snap.forEach(doc => {
      const d = doc.data();
      leaderboardData.push({ uid:d.uid, name:d.name, avatar:d.avatar, score:d.score, level:d.level||0 });
    });
    lbLastFetch = now;
    // Preload avatar images
    leaderboardData.forEach(entry => {
      if (entry.avatar && !entry.avatarImg) {
        entry.avatarImg = new Image();
        entry.avatarImg.crossOrigin = 'anonymous';
        entry.avatarImg.src = entry.avatar;
      }
    });
  } catch(e) { console.warn('Fetch leaderboard failed:', e); }
  lbLoading = false;
}

// ============================================================
//  SFX — Rich Layered Synthesis + Reverb Bus + Compressor
// ============================================================
let audioCtx = null;
let _rvbNode = null, _rvbGain = null, _compNode = null, _masterGain = null;

// BGM playback — robust dual approach + debug indicator
let _bgmBuffer = null;
let _bgmNode = null;
let _bgmGain = null;
let _bgmPlaying = false;
let _bgmLoading = false;
let _bgmDebug = 'waiting';  // visible debug status (remove after fix confirmed)

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!_masterGain) _initBus();

  // Load BGM via XHR → try 3 methods to play it
  if (!_bgmBuffer && !_bgmLoading && audioCtx) {
    _bgmLoading = true;
    _bgmDebug = 'XHR...';
    const xhr = new XMLHttpRequest();
    xhr.open('GET', 'assets/bgm.mp3', true);
    xhr.responseType = 'arraybuffer';
    xhr.onload = function() {
      if (!(xhr.status === 200 || xhr.status === 0)) {
        _bgmDebug = 'HTTP ' + xhr.status;
        _bgmLoading = false;
        return;
      }
      _bgmDebug = 'decode...';
      // Method A: decodeAudioData (callback API for compat)
      audioCtx.decodeAudioData(xhr.response,
        function(decoded) {
          _bgmBuffer = decoded;
          _bgmLoading = false;
          _bgmDebug = 'A:ok';
          _autoStartBGM();
        },
        function() {
          // Method A failed → try Method B: Blob URL + <audio>
          _bgmDebug = 'A:fail→B';
          _bgmLoading = false;
          _tryBlobBGM(xhr.response);
        }
      );
    };
    xhr.onerror = function() {
      _bgmDebug = 'XHR err';
      _bgmLoading = false;
    };
    xhr.send();
  }
}

// Blob URL fallback: create blob from arraybuffer, set as <audio> src
let _bgmBlobReady = false;
function _tryBlobBGM(arrayBuf) {
  const el = document.getElementById('bgm');
  if (!el) { _bgmDebug = 'B:no el'; return; }
  try {
    const blob = new Blob([arrayBuf], {type:'audio/mpeg'});
    const url = URL.createObjectURL(blob);
    el.src = url;
    el.load();
    el.oncanplaythrough = function() {
      _bgmBlobReady = true;
      _bgmDebug = 'B:ready';
      _autoStartBGM();
    };
    el.onerror = function() {
      _bgmDebug = 'B:err→C';
      _trySrcBGM();
    };
  } catch(e) {
    _bgmDebug = 'B:ex→C';
    _trySrcBGM();
  }
}

// Last resort: just try <audio>.play() with original src
function _trySrcBGM() {
  const el = document.getElementById('bgm');
  if (!el) return;
  el.src = 'assets/bgm.mp3';
  el.load();
  el.volume = 0.35;
  const p = el.play();
  if (p && p.then) {
    p.then(() => { _bgmPlaying = true; _bgmDebug = 'C:ok'; })
     .catch(e => { _bgmDebug = 'C:' + e.message.slice(0,20); });
  }
}

function _autoStartBGM() {
  if (settings.musicOn && (screen === SCR.PLAYING || screen === SCR.LEVEL_SELECT ||
      screen === SCR.LEVEL_BRIEF || screen === SCR.PAUSED || screen === SCR.LEVEL_CLEAR)) {
    bgmPlay();
  }
}

function bgmPlay() {
  if (_bgmPlaying) return;

  // Method A: Web Audio BufferSource (best)
  if (audioCtx && _bgmBuffer) {
    if (!_bgmGain) {
      _bgmGain = audioCtx.createGain();
      _bgmGain.connect(audioCtx.destination);
    }
    _bgmGain.gain.value = 0.35;
    _bgmNode = audioCtx.createBufferSource();
    _bgmNode.buffer = _bgmBuffer;
    _bgmNode.loop = true;
    _bgmNode.connect(_bgmGain);
    _bgmNode.start(0);
    _bgmPlaying = true;
    _bgmDebug = 'A:playing';
    return;
  }

  // Method B/C: <audio> element (Blob URL or original)
  const el = document.getElementById('bgm');
  if (el) {
    el.volume = 0.35;
    const p = el.play();
    if (p && p.then) {
      p.then(() => { _bgmPlaying = true; _bgmDebug += '>play'; })
       .catch(e => { _bgmDebug += '>err:' + e.message.slice(0,15); });
    }
  }
}

function bgmStop() {
  if (_bgmNode) {
    try { _bgmNode.stop(); } catch(e) {}
    _bgmNode = null;
  }
  const el = document.getElementById('bgm');
  if (el && !el.paused) el.pause();
  _bgmPlaying = false;
}

function _initBus() {
  // Compressor — punchy dynamics
  _compNode = audioCtx.createDynamicsCompressor();
  _compNode.threshold.value = -18;
  _compNode.knee.value = 8;
  _compNode.ratio.value = 5;
  _compNode.attack.value = 0.002;
  _compNode.release.value = 0.12;

  _masterGain = audioCtx.createGain();
  _masterGain.gain.value = 0.88;
  _compNode.connect(_masterGain);
  _masterGain.connect(audioCtx.destination);

  // Convolver reverb (generated impulse response)
  const rate = audioCtx.sampleRate;
  const len = Math.floor(rate * 0.85);
  const impulse = audioCtx.createBuffer(2, len, rate);
  for (let ch = 0; ch < 2; ch++) {
    const d = impulse.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.6);
    }
  }
  _rvbNode = audioCtx.createConvolver();
  _rvbNode.buffer = impulse;
  _rvbGain = audioCtx.createGain();
  _rvbGain.gain.value = 0.28;
  _rvbNode.connect(_rvbGain);
  _rvbGain.connect(_compNode);
}

// Cached noise buffer
let _nBuf = null;
function _noise() {
  if (_nBuf) return _nBuf;
  const rate = audioCtx.sampleRate;
  const len = Math.floor(rate * 0.5);
  _nBuf = audioCtx.createBuffer(1, len, rate);
  const d = _nBuf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return _nBuf;
}

// Helper: oscillator → gain → compressor
function _osc(type, freq, st, dur, vol, detune) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, st);
  if (detune) o.detune.value = detune;
  g.gain.setValueAtTime(vol, st);
  g.gain.exponentialRampToValueAtTime(0.001, st + dur);
  o.connect(g); g.connect(_compNode);
  o.start(st); o.stop(st + dur + 0.02);
  return { o, g };
}

// Helper: oscillator + reverb send
function _oscW(type, freq, st, dur, vol, wet, detune) {
  const r = _osc(type, freq, st, dur, vol, detune);
  if (wet > 0) {
    const w = audioCtx.createGain();
    w.gain.value = wet;
    r.g.connect(w); w.connect(_rvbNode);
  }
  return r;
}

// Filtered white noise burst for "crunch" texture
function _nBurst(st, dur, freq, Q, vol) {
  const src = audioCtx.createBufferSource();
  src.buffer = _noise();
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = Q;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol, st);
  g.gain.exponentialRampToValueAtTime(0.001, st + dur);
  src.connect(bp); bp.connect(g); g.connect(_compNode);
  src.start(st); src.stop(st + dur + 0.02);
}

function sfx(type) {
  if (!settings.sfxOn) return;
  ensureAudio();
  const t = audioCtx.currentTime;
  switch (type) {
    case 'tick': {
      _osc('sine', 1200, t, 0.04, 0.13);
      _osc('sine', 2400, t, 0.025, 0.05);
      _nBurst(t, 0.02, 4000, 2, 0.04);
      break;
    }
    case 'pop': {
      // Sub thump
      const o1 = _osc('sine', 130, t, 0.13, 0.22);
      o1.o.frequency.exponentialRampToValueAtTime(55, t + 0.13);
      // Mid click pair (detuned for width)
      _osc('sine', 800, t, 0.055, 0.15);
      _osc('triangle', 825, t, 0.05, 0.06);
      // High sparkle
      _osc('sine', 2800, t + 0.008, 0.03, 0.06);
      // Crunch texture
      _nBurst(t, 0.04, 1500, 1.5, 0.07);
      break;
    }
    case 'bonk': {
      _osc('sine', 130, t, 0.16, 0.16);
      _osc('sine', 100, t, 0.16, 0.1, 7);
      _nBurst(t, 0.07, 300, 0.8, 0.09);
      break;
    }
    case 'click': {
      _osc('square', 1100, t, 0.025, 0.07);
      _osc('sine', 2200, t, 0.015, 0.03);
      break;
    }
    case 'gameover': {
      [392, 330, 262].forEach((f, i) => {
        const d = t + i * 0.3;
        _oscW('sine', f, d, 0.55, 0.1, 0.45);
        _oscW('triangle', f * 0.5, d, 0.65, 0.06, 0.3);
        _oscW('sine', f * 2, d, 0.3, 0.03, 0.2);
      });
      break;
    }
    case 'bomb': {
      // Low rumble — 3 detuned sawtooth
      for (let i = 0; i < 3; i++) {
        const o1 = _osc('sawtooth', 85 + i * 18, t, 0.5, 0.09);
        o1.o.frequency.exponentialRampToValueAtTime(22, t + 0.5);
      }
      // Mid crack
      const o2 = _osc('square', 420, t, 0.09, 0.13);
      o2.o.frequency.exponentialRampToValueAtTime(55, t + 0.09);
      // Noise layers
      _nBurst(t, 0.28, 800, 0.6, 0.16);
      _nBurst(t + 0.02, 0.18, 200, 0.8, 0.11);
      // Reverb tail
      _oscW('sine', 55, t, 0.45, 0.07, 0.55);
      break;
    }
    case 'lightning': {
      const o1 = _osc('sawtooth', 3200, t, 0.16, 0.11);
      o1.o.frequency.exponentialRampToValueAtTime(75, t + 0.16);
      _osc('square', 2200, t, 0.09, 0.07, 50);
      _nBurst(t, 0.11, 5000, 3, 0.13);
      _nBurst(t + 0.05, 0.09, 2000, 2, 0.09);
      _oscW('sine', 140, t + 0.04, 0.35, 0.05, 0.4);
      break;
    }
    case 'newRecord': {
      // Triumphant fanfare — ascending major chord arpeggio + brass-like harmonics
      const notes = [523, 659, 784, 1047, 1319]; // C5 E5 G5 C6 E6
      notes.forEach((f, i) => {
        const d = t + i * 0.12;
        // Main brass-like tone (saw + sine blend)
        _oscW('sawtooth', f, d, 0.6, 0.06, 0.35);
        _oscW('sine', f, d, 0.7, 0.09, 0.25);
        // Octave shimmer
        _oscW('sine', f * 2, d, 0.4, 0.025, 0.2);
        // Slight detune for width
        _osc('sine', f * 1.003, d, 0.5, 0.04, 3);
      });
      // Final sustained chord (C major triad, held)
      const chordT = t + 0.6;
      [1047, 1319, 1568].forEach(f => { // C6 E6 G6
        _oscW('sine', f, chordT, 1.2, 0.07, 0.5);
        _oscW('triangle', f * 0.5, chordT, 1.0, 0.04, 0.3);
      });
      // Cymbal shimmer
      _nBurst(t + 0.5, 0.8, 8000, 1.5, 0.06);
      _nBurst(t + 0.55, 0.6, 12000, 2, 0.04);
      // Deep bass thump
      _oscW('sine', 65, t, 0.5, 0.12, 0.4);
      break;
    }
  }
}

function sfxClear(lines) {
  if (!settings.sfxOn) return;
  ensureAudio();
  const t = audioCtx.currentTime;
  const scale = [0, 4, 7, 12, 16]; // C E G C' E'
  const n = Math.min(lines, 5);
  const base = 523; // C5

  for (let i = 0; i < n; i++) {
    const d = t + i * 0.065;
    const freq = base * Math.pow(2, scale[i] / 12);
    // Rich detuned sine pair
    _oscW('sine', freq, d, 0.24, 0.13, 0.38);
    _oscW('sine', freq, d, 0.24, 0.06, 0.2, 5);
    // Sub-octave warmth
    _oscW('triangle', freq * 0.5, d, 0.2, 0.05, 0.15);
    // High shimmer
    _osc('sine', freq * 2, d, 0.12, 0.03);
    // Crunch per note (escalating)
    _nBurst(d, 0.04, freq * 1.5, 2.2, 0.04 + i * 0.012);
  }

  // Bass impact (scales with lines)
  _osc('sine', 75 + lines * 22, t, 0.22, 0.09 + lines * 0.025);

  // Final shimmer tail for 3+ lines
  if (lines >= 3) {
    const last = t + n * 0.065 + 0.04;
    _oscW('sine', base * Math.pow(2, scale[n - 1] / 12) * 2, last, 0.45, 0.055, 0.55);
    _nBurst(last, 0.09, 6000, 4, 0.055);
    // Extra sub boom for mega clears
    _oscW('sine', 50, t, 0.3, 0.08, 0.4);
  }
}

function sfxCombo() {
  if (!settings.sfxOn) return;
  ensureAudio();
  const t = audioCtx.currentTime;
  // Rich C major chord: C4-E4-G4-C5 layered
  [262, 330, 392, 523].forEach(f => {
    _oscW('sine', f, t, 0.55, 0.09, 0.42);
    _oscW('triangle', f, t, 0.48, 0.04, 0.3, 4);
    _osc('sine', f * 2, t, 0.28, 0.022);
  });
  // Sub bass foundation
  _oscW('sine', 131, t, 0.55, 0.065, 0.32);
  // Sparkle noise sweep
  _nBurst(t, 0.09, 3000, 3, 0.065);
  _nBurst(t + 0.1, 0.07, 5000, 4, 0.045);
}

function sfxStreak() {
  if (!settings.sfxOn) return;
  ensureAudio();
  const t = audioCtx.currentTime;
  const notes = [523, 659, 784, 1047, 1319];
  notes.forEach((f, i) => {
    const d = t + i * 0.048;
    // Main + detuned for width
    _oscW('sine', f, d, 0.3, 0.11, 0.52);
    _oscW('sine', f, d, 0.3, 0.045, 0.3, 6);
    // Echo tap (delayed repeat)
    _oscW('sine', f, d + 0.1, 0.22, 0.04, 0.6);
    // High harmonic
    _osc('sine', f * 2, d, 0.14, 0.022);
  });
  // Rising noise sweep
  _nBurst(t, 0.13, 2000, 2, 0.05);
  _nBurst(t + 0.15, 0.11, 5000, 3, 0.042);
  // Sub impact
  _osc('sine', 95, t, 0.17, 0.065);
}

function placeObstacles(obstacles) {
  if (!obstacles || !obstacles.length) return;
  // Collect available positions (avoid center 4x4)
  const avail = [];
  for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
    if (r>=2&&r<=5&&c>=2&&c<=5) continue; // skip center
    avail.push([r,c]);
  }
  // Shuffle
  for (let i=avail.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [avail[i],avail[j]]=[avail[j],avail[i]];
  }
  let idx=0;
  for (const obs of obstacles) {
    for (let n=0;n<obs.count&&idx<avail.length;n++,idx++) {
      const [r,c] = avail[idx];
      if (obs.type==='stone') state.grid[r][c] = SP.STONE;
      else if (obs.type==='ice') {
        // Place ice over a random color block
        state.grid[r][c] = SP.ICE2; // 2 layers
      }
      else if (obs.type==='locked') state.grid[r][c] = SP.LOCKED;
    }
  }
}

function countObstacles() {
  let count = 0;
  for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
    const v = state.grid[r][c];
    if (v===SP.STONE||v===SP.ICE1||v===SP.ICE2||v===SP.LOCKED) count++;
  }
  state.obstaclesRemaining = count;
}

// ============================================================
//  LAYOUT
// ============================================================
function calcLayout() {
  const w = window.innerWidth, h = window.innerHeight, dpr = window.devicePixelRatio||1;
  const headerH = 60, missionH = 26, trayMinH = 80;
  const gaps = headerH + missionH + 12 + 24 + trayMinH + 24;
  const maxByW = Math.min(w - 28, 440);
  const maxByH = h - gaps;
  const maxG = Math.max(Math.min(maxByW, maxByH), 160);
  const cs = Math.floor(maxG / GRID);
  const gw = cs * GRID;
  const gx = Math.floor((w - gw) / 2);
  const gy = headerH + missionH + 12;
  const trayY = gy + gw + 24;
  const trayH = Math.max(Math.min(cs * 3.5, h - trayY - 24), trayMinH);
  const tcs = Math.max(Math.floor(cs * 0.55), 10);
  const tsw = Math.floor(gw / 3);
  return {w,h,dpr,cs,gw,gx,gy,headerH,missionH,trayY,trayH,tcs,tsw,inner:cs-GAP};
}

function resizeCanvas() {
  layout = calcLayout();
  canvas.width  = layout.w * layout.dpr;
  canvas.height = layout.h * layout.dpr;
  canvas.style.width  = layout.w + 'px';
  canvas.style.height = layout.h + 'px';
  ctx.setTransform(layout.dpr, 0, 0, layout.dpr, 0, 0);
}

// ============================================================
//  DRAWING UTILITIES
// ============================================================
function roundRect(x,y,w,h,r) {
  if(r>w/2) r=w/2; if(r>h/2) r=h/2;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// 8-layer premium candy glass block rendering
function drawBlock(x, y, s, ci, alpha) {
  if (s < 2) return;
  const a = alpha !== undefined ? alpha : 1;
  const c = COLORS[ci % COLORS.length];
  const r = s * 0.16;

  // Layer 1: Drop Shadow (soft, lifted)
  ctx.globalAlpha = a * 0.38;
  ctx.shadowColor = 'rgba(0,0,0,0.55)';
  ctx.shadowBlur = Math.max(4, s * 0.13);
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = Math.max(2, s * 0.07);
  ctx.fillStyle = '#000';
  roundRect(x, y, s, s, r); ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;

  // Layer 2: Base Gradient (3-stop depth)
  ctx.globalAlpha = a;
  const grad = ctx.createLinearGradient(x, y, x, y + s);
  grad.addColorStop(0, c.top);
  grad.addColorStop(0.42, c.base);
  grad.addColorStop(1, c.dark);
  ctx.fillStyle = grad;
  roundRect(x, y, s, s, r); ctx.fill();

  // Layer 3: Bottom bevel shadow (3D depth)
  ctx.globalAlpha = a * 0.3;
  ctx.fillStyle = '#000';
  roundRect(x, y + s * 0.72, s, s * 0.28, r * 0.5); ctx.fill();

  // Layer 4: Radial glass highlight (candy curve)
  ctx.globalAlpha = a * 0.32;
  const glass = ctx.createRadialGradient(
    x + s * 0.38, y + s * 0.14, 0,
    x + s * 0.38, y + s * 0.14, s * 0.62
  );
  glass.addColorStop(0, 'rgba(255,255,255,0.65)');
  glass.addColorStop(0.35, 'rgba(255,255,255,0.18)');
  glass.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glass;
  roundRect(x + s * 0.05, y + s * 0.03, s * 0.9, s * 0.5, r); ctx.fill();

  // Layer 5: Specular streak (elongated shine)
  ctx.globalAlpha = a * 0.2;
  ctx.fillStyle = '#fff';
  roundRect(x + s * 0.14, y + s * 0.07, s * 0.52, s * 0.075, s * 0.04); ctx.fill();

  // Layer 6: Primary specular dot (bright candy shine)
  ctx.globalAlpha = a * 0.52;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x + s * 0.27, y + s * 0.21, Math.max(1.5, s * 0.068), 0, Math.PI * 2); ctx.fill();
  // Secondary smaller dot
  ctx.globalAlpha = a * 0.28;
  ctx.beginPath();
  ctx.arc(x + s * 0.44, y + s * 0.15, Math.max(1, s * 0.032), 0, Math.PI * 2); ctx.fill();

  // Layer 7: Rim Light (colored glow border)
  ctx.globalAlpha = a * 0.55;
  ctx.strokeStyle = c.rim;
  ctx.lineWidth = 1;
  roundRect(x + 0.5, y + 0.5, s - 1, s - 1, r); ctx.stroke();

  // Layer 8: Inner top-edge glow
  ctx.globalAlpha = a * 0.13;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 0.5;
  roundRect(x + 1.5, y + 1, s - 3, s * 0.38, r); ctx.stroke();

  ctx.globalAlpha = 1;
}

function drawEmptyCell(x, y, s) {
  const r = s * 0.15;
  // Gradient fill for depth
  const g = ctx.createLinearGradient(x, y, x, y + s);
  g.addColorStop(0, '#182038');
  g.addColorStop(1, '#131A2E');
  ctx.fillStyle = g;
  roundRect(x, y, s, s, r); ctx.fill();
  // Subtle border
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  roundRect(x, y, s, s, r); ctx.stroke();
  // Inner shadow top edge (depth illusion)
  ctx.globalAlpha = 0.1;
  ctx.fillStyle = '#000';
  roundRect(x + 1, y + 1, s - 2, s * 0.22, r); ctx.fill();
  // Bottom subtle light catch
  ctx.globalAlpha = 0.03;
  ctx.fillStyle = '#fff';
  roundRect(x + 1, y + s * 0.78, s - 2, s * 0.2, r * 0.5); ctx.fill();
  ctx.globalAlpha = 1;
}

// Special block rendering on grid
function drawSpecialBlock(x, y, s, type, now) {
  const r = s * 0.15;
  const pulse = 0.7 + Math.sin(now * 0.005) * 0.3;

  if (type === SP.BOMB) {
    // Dark red/orange base with pulsing glow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    roundRect(x+1,y+3,s,s,r); ctx.fill();
    ctx.globalAlpha = 1;
    const bg = ctx.createLinearGradient(x,y,x,y+s);
    bg.addColorStop(0,'#FF6B40'); bg.addColorStop(1,'#CC3300');
    ctx.fillStyle = bg;
    roundRect(x,y,s,s,r); ctx.fill();
    // Pulsing glow
    ctx.globalAlpha = pulse * 0.3;
    ctx.fillStyle = '#FF4400';
    roundRect(x-2,y-2,s+4,s+4,r+2); ctx.fill();
    ctx.globalAlpha = 1;
    // Bomb icon (circle + fuse)
    const cx=x+s/2, cy=y+s/2, br=s*0.25;
    ctx.fillStyle = '#1a0800';
    ctx.beginPath(); ctx.arc(cx,cy+s*0.05,br,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx,cy-br+s*0.05);
    ctx.quadraticCurveTo(cx+br*0.5,cy-br*1.5,cx+br*0.8,cy-br*1.3);
    ctx.stroke();
    // Spark
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(cx+br*0.8,cy-br*1.3,2,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  else if (type === SP.RAINBOW) {
    // Animated rainbow gradient
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    roundRect(x+1,y+3,s,s,r); ctx.fill();
    ctx.globalAlpha = 1;
    const hueOff = (now * 0.1) % 360;
    const rg = ctx.createLinearGradient(x,y,x+s,y+s);
    for(let i=0;i<=6;i++){
      rg.addColorStop(i/6, `hsl(${(hueOff+i*60)%360},85%,55%)`);
    }
    ctx.fillStyle = rg;
    roundRect(x,y,s,s,r); ctx.fill();
    // White star overlay
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#fff';
    drawStar(x+s/2,y+s/2,s*0.2,4);
    // Rotating halo
    ctx.globalAlpha = pulse * 0.2;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x+s/2,y+s/2,s*0.4,0,Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  else if (type === SP.LIGHTNING) {
    // Yellow-blue electric
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    roundRect(x+1,y+3,s,s,r); ctx.fill();
    ctx.globalAlpha = 1;
    const lg = ctx.createLinearGradient(x,y,x,y+s);
    lg.addColorStop(0,'#FFE040'); lg.addColorStop(1,'#CC9900');
    ctx.fillStyle = lg;
    roundRect(x,y,s,s,r); ctx.fill();
    // Pulsing glow
    ctx.globalAlpha = pulse * 0.25;
    ctx.fillStyle = '#FFFF00';
    roundRect(x-2,y-2,s+4,s+4,r+2); ctx.fill();
    ctx.globalAlpha = 1;
    // Lightning bolt icon
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    const bx=x+s*0.35, by=y+s*0.15;
    ctx.moveTo(bx+s*0.25, by);
    ctx.lineTo(bx+s*0.05, by+s*0.35);
    ctx.lineTo(bx+s*0.2, by+s*0.35);
    ctx.lineTo(bx+s*0.05, by+s*0.7);
    ctx.lineTo(bx+s*0.35, by+s*0.3);
    ctx.lineTo(bx+s*0.2, by+s*0.3);
    ctx.closePath();
    ctx.fill();
  }
}

// Obstacle rendering
function drawObstacle(x, y, s, type, now) {
  const r = s * 0.15;
  if (type === SP.STONE) {
    // Dark gray stone with crack texture
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    roundRect(x+1,y+3,s,s,r); ctx.fill();
    ctx.globalAlpha = 1;
    const sg = ctx.createLinearGradient(x,y,x,y+s);
    sg.addColorStop(0,'#6B6B6B'); sg.addColorStop(0.5,'#4A4A4A'); sg.addColorStop(1,'#333333');
    ctx.fillStyle = sg;
    roundRect(x,y,s,s,r); ctx.fill();
    // Crack lines
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x+s*0.3,y+s*0.2); ctx.lineTo(x+s*0.5,y+s*0.45);
    ctx.lineTo(x+s*0.7,y+s*0.35); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x+s*0.5,y+s*0.45); ctx.lineTo(x+s*0.4,y+s*0.75);
    ctx.stroke();
    // Top highlight
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#fff';
    roundRect(x+s*0.1,y+s*0.05,s*0.8,s*0.2,r*0.5); ctx.fill();
    ctx.globalAlpha = 1;
    // Stone icon
    ctx.font = `${Math.round(s*0.4)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\uD83E\uDEA8', x+s/2, y+s/2+1);
  }
  else if (type === SP.ICE1 || type === SP.ICE2) {
    const layers = type === SP.ICE2 ? 2 : 1;
    // Icy blue translucent block
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#000';
    roundRect(x+1,y+3,s,s,r); ctx.fill();
    ctx.globalAlpha = layers===2 ? 0.85 : 0.6;
    const ig = ctx.createLinearGradient(x,y,x+s,y+s);
    ig.addColorStop(0,'#B3E5FC'); ig.addColorStop(0.5,'#81D4FA'); ig.addColorStop(1,'#4FC3F7');
    ctx.fillStyle = ig;
    roundRect(x,y,s,s,r); ctx.fill();
    ctx.globalAlpha = 1;
    // Frost pattern
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 0.8;
    // Cross frost
    ctx.beginPath();
    ctx.moveTo(x+s*0.2,y+s*0.3); ctx.lineTo(x+s*0.5,y+s*0.5);
    ctx.lineTo(x+s*0.8,y+s*0.3); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x+s*0.5,y+s*0.5); ctx.lineTo(x+s*0.5,y+s*0.8);
    ctx.stroke();
    if (layers===2) {
      // Double border for 2-layer ice
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      roundRect(x+2,y+2,s-4,s-4,r); ctx.stroke();
      ctx.strokeStyle = 'rgba(200,230,255,0.3)';
      ctx.lineWidth = 1;
      roundRect(x+4,y+4,s-8,s-8,r); ctx.stroke();
    }
    // Ice emoji
    ctx.globalAlpha = 0.7;
    ctx.font = `${Math.round(s*0.35)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\uD83E\uDDCA', x+s/2, y+s/2);
    ctx.globalAlpha = 1;
  }
  else if (type === SP.LOCKED) {
    // Dark locked cell
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    roundRect(x+1,y+3,s,s,r); ctx.fill();
    ctx.globalAlpha = 1;
    const lg = ctx.createLinearGradient(x,y,x,y+s);
    lg.addColorStop(0,'#2A2A3A'); lg.addColorStop(1,'#1A1A28');
    ctx.fillStyle = lg;
    roundRect(x,y,s,s,r); ctx.fill();
    // Chain border
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.setLineDash([4,3]);
    roundRect(x+2,y+2,s-4,s-4,r); ctx.stroke();
    ctx.setLineDash([]);
    // Lock icon
    ctx.font = `${Math.round(s*0.4)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\uD83D\uDD12', x+s/2, y+s/2);
  }
}

function drawStar(cx, cy, r, points) {
  ctx.beginPath();
  for(let i=0; i<points*2; i++){
    const a = (i/(points*2))*Math.PI*2 - Math.PI/2;
    const rad = i%2===0 ? r : r*0.4;
    if(i===0) ctx.moveTo(cx+Math.cos(a)*rad, cy+Math.sin(a)*rad);
    else ctx.lineTo(cx+Math.cos(a)*rad, cy+Math.sin(a)*rad);
  }
  ctx.closePath();
  ctx.fill();
}

// Easing
function easeOut3(t) { return 1-Math.pow(1-t,3); }
function easeIn2(t) { return t*t; }
function easeOutBack(t) { const c=1.7; return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2); }
function easeOutElastic(t) { return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*((2*Math.PI)/3))+1; }

// ============================================================
//  PARTICLES (upgraded: gravity, star shapes)
// ============================================================
const MAX_PARTICLES = 500;

function spawnParticles(cx, cy, ci, count, opts) {
  const c = ci >= 0 && ci < COLORS.length ? COLORS[ci] : null;
  const baseColor = c ? c.base : '#fff';
  const lightColor = c ? c.top : '#fff';
  const o = opts || {};
  for (let i=0; i<count && particles.length<MAX_PARTICLES; i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = (o.speed || 2) + Math.random()*(o.speedVar || 3);
    particles.push({
      x:cx, y:cy,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - (o.upBias||1.5),
      life: 1,
      decay: 0.01 + Math.random()*0.018,
      size: (o.minSize||2) + Math.random()*(o.maxSize||3),
      color: Math.random()>0.3 ? baseColor : lightColor,
      gravity: o.gravity !== undefined ? o.gravity : 0.1,
      star: o.star ? Math.random()>0.5 : false,
    });
  }
}

function updateParticles() {
  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.99;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i,1);
  }
}

function renderParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = p.color;
    if (p.star) {
      drawStar(p.x, p.y, p.size*p.life, 4);
    } else {
      // Motion-elongated circle
      const spd = Math.sqrt(p.vx*p.vx+p.vy*p.vy);
      if (spd > 1.5) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(Math.atan2(p.vy, p.vx));
        ctx.scale(1+spd*0.12, 1);
        ctx.beginPath();
        ctx.arc(0,0, p.size*p.life, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }
  ctx.globalAlpha = 1;
}

// ============================================================
//  GAME LOGIC
// ============================================================
function randomPiece() {
  const p = PIECES[Math.floor(Math.random()*PIECES.length)];
  return {c:p.c.map(v=>[v[0],v[1]]), ci:p.ci, rows:p.rows, cols:p.cols, special:null};
}

function specialPiece(type) {
  return {c:[[0,0]], ci:-1, rows:1, cols:1, special:type};
}

function generatePieces() {
  state.pieces = [randomPiece(), randomPiece(), randomPiece()];
  // 15% chance to replace one piece with a special block
  if (Math.random() < 0.15) {
    const slot = Math.floor(Math.random()*3);
    const roll = Math.random();
    const type = roll < 0.50 ? 'bomb' : roll < 0.80 ? 'rainbow' : 'lightning';
    state.pieces[slot] = specialPiece(type);
  }
  state.trayAnim = performance.now();
  state.mission.trayTime = performance.now();
}

function canPlace(piece, row, col) {
  for (const [r,c] of piece.c) {
    const gr=row+r, gc=col+c;
    if (gr<0||gr>=GRID||gc<0||gc>=GRID) return false;
    const v = state.grid[gr][gc];
    if (v !== 0) return false; // occupied, stone, locked, etc.
  }
  return true;
}

function placePiece(piece, row, col) {
  for (const [r,c] of piece.c) {
    if (piece.special) {
      const val = piece.special==='bomb'?SP.BOMB : piece.special==='rainbow'?SP.RAINBOW : SP.LIGHTNING;
      state.grid[row+r][col+c] = val;
    } else {
      state.grid[row+r][col+c] = piece.ci + 1;
    }
  }
}

function checkClear() {
  const fullRows=[], fullCols=[];
  for (let r=0;r<GRID;r++) {
    // Row is "full" if every cell has a non-zero value that isn't locked
    if (state.grid[r].every(v=>v>0 && v!==SP.LOCKED)) fullRows.push(r);
  }
  for (let c=0;c<GRID;c++) {
    let full=true;
    for (let r=0;r<GRID;r++) {
      const v=state.grid[r][c];
      if(v===0||v===SP.LOCKED){full=false;break;}
    }
    if (full) fullCols.push(c);
  }
  if (!fullRows.length && !fullCols.length) return null;

  const set = new Set();
  for (const r of fullRows) for (let c=0;c<GRID;c++) set.add(r*GRID+c);
  for (const c of fullCols) for (let r=0;r<GRID;r++) set.add(r*GRID+c);

  const cells = [];
  const iceBreaks = [];
  for (const k of set) {
    const r=(k/GRID)|0, c=k%GRID;
    const v = state.grid[r][c];
    // Stones resist line clears
    if (v===SP.STONE) continue;
    // Locked cells can't be in full rows (filtered above)
    if (v===SP.LOCKED) continue;
    // Ice degrades
    if (v===SP.ICE2) {
      state.grid[r][c] = SP.ICE1;
      iceBreaks.push({r,c});
      continue;
    }
    if (v===SP.ICE1) {
      state.grid[r][c] = 0;
      iceBreaks.push({r,c});
      cells.push({r,c,ci:6}); // blue for ice
      continue;
    }
    // Track color clears
    if (v>0&&v<=10) state.colorCleared[v-1] = (state.colorCleared[v-1]||0)+1;
    cells.push({r,c,ci: v>0&&v<=10 ? v-1 : 0});
    state.grid[r][c] = 0;
  }

  // Unlock adjacent locked cells when lines cleared next to them
  const clearedSet = new Set(cells.map(c=>c.r*GRID+c.c));
  for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
    if (state.grid[r][c]===SP.LOCKED) {
      // Check if any adjacent cell was just cleared
      const adj = [[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
      for (const [ar,ac] of adj) {
        if (ar>=0&&ar<GRID&&ac>=0&&ac<GRID&&clearedSet.has(ar*GRID+ac)) {
          state.grid[r][c] = 0;
          cells.push({r,c,ci:5}); // purple for unlock
          break;
        }
      }
    }
  }

  // Recount obstacles
  if (gameMode==='level') countObstacles();

  return {lines:fullRows.length+fullCols.length, cells, n:cells.length, iceBreaks};
}

function canPlaceAnywhere(piece) {
  for (let r=0;r<GRID;r++)
    for (let c=0;c<GRID;c++)
      if (canPlace(piece,r,c)) return true;
  return false;
}

function checkGameOver() {
  const rem = state.pieces.filter(p=>p!==null);
  return rem.length>0 && rem.every(p=>!canPlaceAnywhere(p));
}

function pickCheer(lines) {
  const tier = Math.min(lines,3)-1;
  const arr = CHEER[tier];
  return arr[Math.floor(Math.random()*arr.length)];
}

// Save state snapshot for undo
function saveUndoSnap() {
  state.undoSnap = {
    grid: state.grid.map(r=>[...r]),
    score: state.score,
    pieces: state.pieces.map(p=>p?{...p,c:p.c.map(v=>[...v])}:null),
    combo: state.combo,
    streak: state.streak,
  };
}

function doUndo() {
  if (!state.undoSnap || state.undoUsed || state.gameOver) return;
  state.undoUsed = true;
  state.grid = state.undoSnap.grid;
  state.score = state.undoSnap.score;
  state.pieces = state.undoSnap.pieces;
  state.combo = state.undoSnap.combo;
  state.streak = state.undoSnap.streak;
  displayScore = state.score;
  sfx('click');
}

// Special block effects
function detonateBomb(row, col) {
  const cleared = [];
  for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
    const r=row+dr, c=col+dc;
    if (r>=0&&r<GRID&&c>=0&&c<GRID&&state.grid[r][c]!==0) {
      const v = state.grid[r][c];
      // Bombs can destroy stones, ice, locked — everything!
      cleared.push({r,c,ci:v>0&&v<=10?v-1:4});
      state.grid[r][c] = 0;
    }
  }
  if (gameMode==='level') countObstacles();
  return cleared;
}

function triggerLightning(row) {
  const cleared = [];
  for (let c=0;c<GRID;c++) {
    if (state.grid[row][c]!==0) {
      const v = state.grid[row][c];
      cleared.push({r:row,c,ci:v>0&&v<=10?v-1:3});
      state.grid[row][c] = 0;
    }
  }
  return cleared;
}

// Mission check
function checkMission(event, data) {
  if (!state.mission || state.mission.completed) return;
  const m = state.mission;
  switch(m.type) {
    case 0: // Clear 3 lines at once
      if (event==='clear' && data && data.lines>=3) completeMission();
      break;
    case 1: // Score 500 in 10 moves
      if (event==='place') {
        m.movesCount++;
        if (state.score>=500 && m.movesCount<=10) completeMission();
      }
      break;
    case 2: // Use all 3 pieces in 30s
      if (event==='trayEmpty') {
        if (performance.now()-m.trayTime < 30000) completeMission();
      }
      break;
    case 3: // Achieve 2+ combo
      if (event==='clear' && data && data.lines>=2) completeMission();
      break;
    case 4: // Reach 5 streak
      if (event==='streak' && state.streak>=5) completeMission();
      break;
  }
}

function completeMission() {
  state.mission.completed = true;
  state.score += state.mission.reward;
  const L = layout;
  anims.push({type:'missionComplete', x:L.gx+L.gw/2, y:L.headerH+L.missionH/2+2,
    text:'+'+state.mission.reward, start:performance.now(), dur:1200});
}

// Main placement logic
function doPlace(idx, row, col) {
  const piece = state.pieces[idx];
  if (!piece || !canPlace(piece, row, col)) return false;

  saveUndoSnap();
  placePiece(piece, row, col);
  const baseScore = piece.c.length * 10;
  state.pieces[idx] = null;
  state.stats.piecesPlaced++;

  const now = performance.now();
  const L = layout;

  sfx('pop');

  // Place glow anim
  anims.push({
    type:'place',
    cells: piece.c.map(([r,c])=>({r:row+r,c:col+c,ci:piece.special?4:piece.ci})),
    start:now, dur:250
  });

  let specialScore = 0;

  // Special block effects — execute BEFORE line clear
  if (piece.special === 'bomb') {
    sfx('bomb');
    const cleared = detonateBomb(row, col);
    specialScore = cleared.length * 15;
    anims.push({type:'explosion', x:L.gx+(col)*L.cs+L.cs/2, y:L.gy+(row)*L.cs+L.cs/2, start:now+80, dur:400});
    anims.push({type:'shake', intensity:6, start:now+80, dur:250});
    for (const cell of cleared) {
      spawnParticles(L.gx+cell.c*L.cs+L.cs/2, L.gy+cell.r*L.cs+L.cs/2, cell.ci, 8,
        {speed:3,speedVar:4,star:true});
    }
  }
  else if (piece.special === 'lightning') {
    sfx('lightning');
    const cleared = triggerLightning(row);
    specialScore = cleared.length * 15;
    anims.push({type:'beam', row:row, start:now+60, dur:350});
    anims.push({type:'shake', intensity:4, start:now+60, dur:200});
    for (const cell of cleared) {
      spawnParticles(L.gx+cell.c*L.cs+L.cs/2, L.gy+cell.r*L.cs+L.cs/2, cell.ci, 5,
        {speed:2,speedVar:2,upBias:0.5});
    }
  }
  // Rainbow: no immediate effect, stays on grid as value 12

  const result = checkClear();
  let clearScore = 0;

  if (result) {
    state.streak++;
    state.stats.linesCleared += result.lines;
    if (result.lines > state.stats.maxCombo) state.stats.maxCombo = result.lines;
    if (state.streak > state.stats.longestStreak) state.stats.longestStreak = state.streak;

    const mult = Math.min(state.streak, 8);
    clearScore = result.n*10 + (10+result.lines*10);
    clearScore = Math.round(clearScore * mult);
    state.combo = result.lines;

    sfxClear(result.lines);
    checkMission('clear', result);
    checkMission('streak');

    const cx = L.gx + L.gw/2;
    const cy = L.gy + L.gw/2;

    // Clear animations + particles
    anims.push({type:'clear', cells:result.cells, start:now+60, dur:380});

    // Particles per cleared cell (generous for impact)
    const pCount = result.lines >= 3 ? 22 : result.lines >= 2 ? 14 : 8;
    for (const cell of result.cells) {
      spawnParticles(L.gx+cell.c*L.cs+L.cs/2, L.gy+cell.r*L.cs+L.cs/2, cell.ci, pCount,
        {star: result.lines>=2, gravity:0.08, speed:2.5, speedVar:4, maxSize:4});
    }
    // Extra white sparkle burst from center for 2+ lines
    if (result.lines >= 2) {
      spawnParticles(cx, cy, -1, result.lines >= 3 ? 30 : 15,
        {star:true, speed:4, speedVar:5, upBias:2, gravity:0.06, minSize:1.5, maxSize:3});
    }

    // Score popup
    anims.push({type:'score', text:'+'+clearScore, x:cx, y:cy+50, start:now+60, dur:900});

    // Cheer text
    const cheer = pickCheer(result.lines);
    anims.push({type:'cheer', text:cheer, x:cx, y:cy-30, start:now+40, dur:1000,
      color: result.lines>=3?'#ff5577':result.lines>=2?'#ffd34e':'#fff',
      size: result.lines>=3?38:result.lines>=2?32:24});

    // Combo badge
    if (result.lines >= 2) {
      sfxCombo();
      anims.push({type:'combo', text:'COMBO x'+result.lines, x:cx, y:cy-70, start:now+120, dur:1300});
    }

    // Screen shake (intensified)
    if (result.lines >= 2) {
      anims.push({type:'shake', intensity:result.lines>=3?8:4.5, start:now+60, dur:result.lines>=3?280:200});
    }

    // Full-board flash for 2+ lines (color tinted for 3+)
    if (result.lines >= 2) {
      anims.push({type:'boardFlash', start:now+60, dur:result.lines>=3?200:120});
    }

    // Streak milestones
    if (state.streak >= 3) {
      sfxStreak();
      const st = state.streak>=6?(STREAK_CHEER[6]||'GODLIKE!'):
                 STREAK_CHEER[state.streak]||('x'+state.streak+' STREAK!');
      anims.push({type:'streakBurst', text:st, x:cx, y:cy+10, start:now+200, dur:1400,
        size:Math.min(26+state.streak*3,44)});
    }
  } else {
    state.streak = 0;
    state.combo = 0;
  }

  state.score += baseScore + clearScore + specialScore;
  checkMission('place');

  if (state.score > state.best) {
    state.best = state.score;
    saveBest(state.best);
    // Trigger NEW RECORD celebration — only if we beat a real previous record (not first game)
    if (!state.newRecordTriggered && state.prevBest > 0 && state.score > state.prevBest) {
      state.newRecordTriggered = true;
      sfx('newRecord');
      const L = layout;
      const now2 = performance.now();
      anims.push({type:'newRecord', x:L.w/2, y:L.h*0.35, start:now2, dur:2800});
      // Gold particle explosion
      for (let i = 0; i < 30; i++) {
        spawnParticles(L.w/2 + (Math.random()-0.5)*200, L.h*0.35,
          Math.floor(Math.random()*10), 2,
          {star:true, speed:4, speedVar:5, upBias:1, gravity:0.06, minSize:2, maxSize:5});
      }
    }
  }

  if (state.pieces.every(p=>p===null)) {
    checkMission('trayEmpty');
    generatePieces();
  }

  // Level mode: decrement moves and check goals
  if (gameMode==='level' && currentLevel) {
    state.movesLeft--;
    // Check level goal
    const goalMet = checkLevelGoal();
    if (goalMet) {
      // Level clear!
      levelClearTime = performance.now();
      levelStarsEarned = calcLevelStars();
      // Save progress
      const lid = currentLevel.id;
      const prev = levelProgress.levels[lid];
      if (!prev || levelStarsEarned > prev.stars) {
        levelProgress.levels[lid] = { stars:levelStarsEarned, best:state.score };
      } else if (state.score > prev.best) {
        prev.best = state.score;
      }
      if (lid >= levelProgress.unlocked) {
        levelProgress.unlocked = Math.min(lid+1, LEVELS.length);
      }
      saveLevelProgress();
      screen = SCR.LEVEL_CLEAR;
      return true;
    }
    if (state.movesLeft <= 0) {
      // Out of moves — game over
      state.gameOver = true;
      state.goAnimStart = performance.now();
      sfx('gameover');
      screen = SCR.GAME_OVER;
      saveScoreToLeaderboard(state.score);
      return true;
    }
  }

  if (checkGameOver()) {
    state.gameOver = true;
    state.goAnimStart = performance.now();
    sfx('gameover');
    screen = SCR.GAME_OVER;
    saveScoreToLeaderboard(state.score);
  }
  return true;
}

function checkLevelGoal() {
  if (!currentLevel) return false;
  switch(currentLevel.goal) {
    case 'score': return state.score >= currentLevel.target;
    case 'lines': return state.stats.linesCleared >= currentLevel.target;
    case 'clear_color': {
      const ci = currentLevel.targetColor || 0;
      return (state.colorCleared[ci]||0) >= currentLevel.target;
    }
    case 'clear_obstacles': return state.obstaclesRemaining === 0;
  }
  return false;
}

function calcLevelStars() {
  if (!currentLevel) return 0;
  const s = currentLevel.stars;
  const val = currentLevel.goal==='score' ? state.score :
              currentLevel.goal==='lines' ? state.stats.linesCleared :
              currentLevel.goal==='clear_color' ? (state.colorCleared[currentLevel.targetColor||0]||0) :
              state.obstaclesRemaining===0 ? 1 : 0;
  if (val >= s[2]) return 3;
  if (val >= s[1]) return 2;
  if (val >= s[0]) return 1;
  return 1; // at minimum 1 star for clearing
}

function toggleMusic() {
  settings.musicOn = !settings.musicOn;
  saveSettings();
  if (settings.musicOn) {
    ensureAudio();
    bgmPlay();
  } else {
    bgmStop();
  }
}

// ============================================================
//  RENDERING — BACKGROUND (with atmospheric bokeh)
// ============================================================
const _bokeh = [];
let _bokehReady = false;

function drawBackground() {
  const L = layout;

  // Init bokeh particles on first call
  if (!_bokehReady) {
    _bokehReady = true;
    for (let i = 0; i < 18; i++) {
      _bokeh.push({
        x: Math.random() * L.w,
        y: Math.random() * L.h,
        r: 10 + Math.random() * 28,
        color: COLORS[Math.floor(Math.random() * COLORS.length)].base,
        alpha: 0.022 + Math.random() * 0.038,
        vx: (Math.random() - 0.5) * 0.12,
        vy: -0.05 - Math.random() * 0.1,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }

  // World-themed background for level mode
  let bg1 = '#1E2A4A', bg2 = '#0D1321';
  if (gameMode === 'level' && currentLevel) {
    const w = WORLDS[currentLevel.world] || WORLDS[0];
    bg1 = w.bg1; bg2 = w.bg2;
  }

  // Radial gradient: center → edge
  const bg = ctx.createRadialGradient(L.w/2, L.h*0.35, 0, L.w/2, L.h*0.35, L.w*0.95);
  bg.addColorStop(0, bg1);
  bg.addColorStop(1, bg2);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, L.w, L.h);

  // Bokeh particles — soft colored orbs drifting
  const now = performance.now();
  for (const b of _bokeh) {
    b.x += b.vx;
    b.y += b.vy;
    b.x += Math.sin(now * 0.0003 + b.phase) * 0.08;
    if (b.y < -b.r * 2) { b.y = L.h + b.r * 2; b.x = Math.random() * L.w; }
    if (b.x < -b.r * 2) b.x = L.w + b.r;
    if (b.x > L.w + b.r * 2) b.x = -b.r;
    const pulse = b.alpha + Math.sin(now * 0.0008 + b.phase) * 0.012;
    ctx.globalAlpha = Math.max(0, pulse);
    const grd = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
    grd.addColorStop(0, b.color);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Vignette overlay (slightly stronger)
  const vig = ctx.createRadialGradient(L.w/2,L.h/2,L.w*0.22, L.w/2,L.h/2,L.w*0.88);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle = vig;
  ctx.fillRect(0,0,L.w,L.h);
}

// ============================================================
//  RENDERING — MENU SCREEN
// ============================================================
function renderMenu(now) {
  const L = layout;
  const CUTE = '"Nunito","Comic Neue","Segoe UI",sans-serif';
  const cx = L.w/2, cy = L.h/2;
  if (!menuAnim) menuAnim = now;
  const mt = Math.min((now - menuAnim)/800, 1);
  const e = easeOut3(mt);

  // Floating decorative blocks in background
  ctx.globalAlpha = e * 0.12;
  for (let i = 0; i < 8; i++) {
    const bx = (L.w * 0.1) + (i % 4) * (L.w * 0.22);
    const by = (i < 4 ? L.h * 0.12 : L.h * 0.72) + Math.sin(now * 0.001 + i * 1.3) * 12;
    const bs = 18 + (i % 3) * 8;
    const rot = Math.sin(now * 0.0006 + i * 0.9) * 0.15;
    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(rot);
    drawBlock(-bs/2, -bs/2, bs, i % COLORS.length, e * 0.15);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Cute mascot — simple block face with blinking
  const mascotY = cy - 160 - (1-e)*40;
  const mascotS = 48;
  ctx.globalAlpha = e;
  drawBlock(cx-mascotS/2, mascotY-mascotS/2, mascotS, 6);
  // Eyes (blink every ~3s)
  const blinkPhase = (now % 3000) < 150;
  ctx.fillStyle = '#fff';
  if (blinkPhase) {
    ctx.fillRect(cx-12, mascotY-4, 8, 2);
    ctx.fillRect(cx+4, mascotY-4, 8, 2);
  } else {
    ctx.beginPath(); ctx.arc(cx-8, mascotY-3, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+8, mascotY-3, 3, 0, Math.PI*2); ctx.fill();
  }
  // Smile
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, mascotY+4, 8, 0.1*Math.PI, 0.9*Math.PI);
  ctx.stroke();

  // Title: "Blocktopia" with gold glow
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const titleY = mascotY + mascotS/2 + 30;
  ctx.globalAlpha = e;

  // Gold glow
  ctx.shadowColor = 'rgba(255,200,60,0.7)';
  ctx.shadowBlur = 40;
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 48px '+CUTE;
  ctx.fillText('Blocktopia', cx, titleY);
  ctx.fillText('Blocktopia', cx, titleY);
  ctx.strokeStyle = 'rgba(255,170,0,0.5)';
  ctx.lineWidth = 1.5;
  ctx.strokeText('Blocktopia', cx, titleY);
  ctx.shadowBlur = 0;

  // Shimmer
  const shimmer = 0.5 + Math.sin(now * 0.003) * 0.3;
  ctx.globalAlpha = e * shimmer * 0.15;
  ctx.fillStyle = '#fff';
  ctx.fillText('Blocktopia', cx, titleY);
  ctx.globalAlpha = e;

  // Subtitle
  ctx.fillStyle = '#8899AA';
  ctx.font = '15px '+CUTE;
  ctx.fillText('Tap, Place, Clear!', cx, titleY + 38);

  // Level Mode button — primary
  const btnW = 220, btnH = 50;
  const btn1Y = titleY + 72 - (1-e)*20;
  const btnX = cx - btnW/2;
  ctx.shadowColor = 'rgba(100,60,255,0.4)';
  ctx.shadowBlur = 20;
  const btnGrad = ctx.createLinearGradient(btnX, btn1Y, btnX+btnW, btn1Y+btnH);
  btnGrad.addColorStop(0, '#5577FF');
  btnGrad.addColorStop(1, '#9944FF');
  ctx.fillStyle = btnGrad;
  roundRect(btnX, btn1Y, btnW, btnH, btnH/2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(180,160,255,0.3)';
  ctx.lineWidth = 1.5;
  roundRect(btnX, btn1Y, btnW, btnH, btnH/2); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 19px '+CUTE;
  ctx.fillText('\uD83C\uDFAF \u95DC\u5361\u6A21\u5F0F Levels', cx, btn1Y + btnH/2);
  hitAreas.playLevels = {x:btnX, y:btn1Y, w:btnW, h:btnH};

  // Endless Mode button — secondary
  const btn2Y = btn1Y + btnH + 14;
  ctx.strokeStyle = 'rgba(76,175,80,0.5)';
  ctx.lineWidth = 2;
  roundRect(btnX, btn2Y, btnW, btnH, btnH/2); ctx.stroke();
  ctx.fillStyle = '#4CAF50';
  ctx.font = 'bold 19px '+CUTE;
  ctx.fillText('\u221E \u7121\u76E1\u6A21\u5F0F Endless', cx, btn2Y + btnH/2);
  hitAreas.play = {x:btnX, y:btn2Y, w:btnW, h:btnH};

  // Leaderboard button
  const btn3Y = btn2Y + btnH + 14;
  ctx.fillStyle = 'rgba(255,200,60,0.08)';
  roundRect(btnX, btn3Y, btnW, btnH*0.85, btnH/2); ctx.fill();
  ctx.fillStyle = '#ffd34e';
  ctx.font = 'bold 16px '+CUTE;
  ctx.fillText('\uD83C\uDFC6 \u6392\u884C\u699C Leaderboard', cx, btn3Y + btnH*0.85/2);
  hitAreas.leaderboard = {x:btnX, y:btn3Y, w:btnW, h:Math.round(btnH*0.85)};

  // Best score
  ctx.fillStyle = '#556677';
  ctx.font = '13px '+CUTE;
  ctx.fillText('BEST  '+settings.bestScore.toLocaleString(), cx, btn3Y + btnH*0.85 + 26);

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawHeader(now) {
  const L = layout;
  const scoreStr = Math.round(displayScore).toLocaleString();

  ctx.fillStyle = '#667788';
  ctx.font = '600 11px "Segoe UI",-apple-system,system-ui,sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('SCORE', L.gx, L.headerH/2 - 8);

  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 24px "Segoe UI",-apple-system,system-ui,sans-serif';
  ctx.fillText(scoreStr, L.gx, L.headerH/2 + 14);

  ctx.fillStyle = '#667788';
  ctx.font = '600 11px "Segoe UI",-apple-system,system-ui,sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('BEST', L.gx + L.gw - 36, L.headerH/2 - 8);

  ctx.fillStyle = '#889AAB';
  ctx.font = 'bold 18px "Segoe UI",-apple-system,system-ui,sans-serif';
  ctx.fillText(state.best.toLocaleString(), L.gx + L.gw - 36, L.headerH/2 + 14);

  // Streak badge (center of header)
  if (state.streak >= 2 && !state.gameOver) {
    const pulse = 0.85 + Math.sin(now*0.008)*0.15;
    ctx.textAlign = 'center';
    ctx.globalAlpha = pulse;
    const bw = 88 + state.streak*4;
    const bx = L.gx + L.gw/2 - bw/2;
    const by = L.headerH/2 - 12;
    // Gold gradient badge
    const bg = ctx.createLinearGradient(bx, by, bx+bw, by+22);
    bg.addColorStop(0, 'rgba(255,200,60,0.15)');
    bg.addColorStop(1, 'rgba(255,150,30,0.15)');
    ctx.fillStyle = bg;
    roundRect(bx, by, bw, 22, 11);
    ctx.fill();
    ctx.fillStyle = '#ffd34e';
    ctx.font = 'bold 13px "Segoe UI",-apple-system,system-ui,sans-serif';
    ctx.fillText('STREAK x'+state.streak, L.gx+L.gw/2, L.headerH/2);
    ctx.globalAlpha = 1;
  }

  // Gear icon (top-right, doesn't overlap BEST score)
  const gx = L.gx + L.gw - 14;
  const gy = L.headerH/2 - 18;
  drawGearIcon(gx, gy, 22);
  hitAreas.gear = {x:gx-14, y:gy-14, w:28, h:28};
}

function drawGearIcon(cx, cy, s) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.strokeStyle = '#667788';
  ctx.lineWidth = 1.4;
  const teeth = 8, outer = s*0.42, inner = s*0.30;
  ctx.beginPath();
  for (let i=0;i<teeth*2;i++){
    const a=(i/(teeth*2))*Math.PI*2;
    const r=i%2===0?outer:inner;
    if(i===0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, s*0.12, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

// ============================================================
//  RENDERING — MISSION BAR

function drawMissionBar(now) {
  const L = layout;
  const m = state.mission;

// ============================================================
//  RENDERING — GRID
// ============================================================
function drawGrid(now) {
  const L = layout;

  // Grid container — inner glow with depth
  ctx.fillStyle = '#1A2540';
  roundRect(L.gx-5, L.gy-5, L.gw+10, L.gw+10, 12);
  ctx.fill();
  // Soft blue inner glow
  ctx.shadowColor = 'rgba(80,130,255,0.12)';
  ctx.shadowBlur = 15;
  ctx.strokeStyle = 'rgba(100,150,255,0.08)';
  ctx.lineWidth = 1;
  roundRect(L.gx-5, L.gy-5, L.gw+10, L.gw+10, 12);
  ctx.stroke();
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  // Subtle inner top highlight
  ctx.globalAlpha = 0.04;
  ctx.fillStyle = '#fff';
  roundRect(L.gx-3, L.gy-4, L.gw+6, 6, 4);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Cells
  for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
    const x = L.gx + c*L.cs + GAP/2;
    const y = L.gy + r*L.cs + GAP/2;
    const v = state.grid[r][c];
    if (v >= SP.STONE) {
      drawObstacle(x, y, L.inner, v, now);
    } else if (v >= SP.BOMB) {
      drawSpecialBlock(x, y, L.inner, v, now);
    } else if (v > 0) {
      drawBlock(x, y, L.inner, v-1);
    } else {
      drawEmptyCell(x, y, L.inner);
    }
  }
}

// ============================================================
//  RENDERING — GHOST PREVIEW
// ============================================================
function drawGhostPreview(now) {
  if (!drag.active || !drag.piece || state.gameOver) return;
  const L = layout;
  const gp = getGridSnap();
  if (!gp) return;

  const valid = canPlace(drag.piece, gp.row, gp.col);
  const pulse = 0.28 + Math.sin(now*0.006)*0.1;

  for (const [r,c] of drag.piece.c) {
    const gr=gp.row+r, gc=gp.col+c;
    if (gr>=0&&gr<GRID&&gc>=0&&gc<GRID) {
      const x = L.gx + gc*L.cs + GAP/2;
      const y = L.gy + gr*L.cs + GAP/2;
      if (valid) {
        if (drag.piece.special) {
          const sv = drag.piece.special==='bomb'?SP.BOMB:drag.piece.special==='rainbow'?SP.RAINBOW:SP.LIGHTNING;
          ctx.globalAlpha = pulse;
          drawSpecialBlock(x,y,L.inner,sv,now);
          ctx.globalAlpha = 1;
        } else {
          drawBlock(x,y,L.inner,drag.piece.ci,pulse);
        }
      } else {
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = '#ff2244';
        roundRect(x,y,L.inner,L.inner,L.inner*0.15);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }
}

// ============================================================
//  RENDERING — TRAY
// ============================================================
function drawTray(now) {
  const L = layout;

  // Tray background
  ctx.fillStyle = '#141C30';
  roundRect(L.gx-6, L.trayY-10, L.gw+12, L.trayH+20, 12);
  ctx.fill();
  ctx.strokeStyle = '#1E2A4A';
  ctx.lineWidth = 0.5;
  roundRect(L.gx-6, L.trayY-10, L.gw+12, L.trayH+20, 12);
  ctx.stroke();

  // Separator dots
  for (let i=1;i<3;i++) {
    const x = L.gx + i*L.tsw;
    for (let dy=0;dy<3;dy++) {
      ctx.fillStyle = '#1E2A4A';
      ctx.beginPath();
      ctx.arc(x, L.trayY+L.trayH*0.3+dy*L.trayH*0.2, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
  }

  const trayT = state.trayAnim ? Math.min((now-state.trayAnim)/300, 1) : 1;
  const slideY = (1-easeOut3(trayT))*20;
  const fadeA = easeOut3(trayT);

  for (let i=0;i<3;i++) {
    const piece = state.pieces[i];
    if (!piece) continue;
    if (drag.active && drag.pieceIdx===i) continue;

    const slotX = L.gx + i*L.tsw;
    const cx = slotX + L.tsw/2;
    const cy = L.trayY + L.trayH/2 + slideY;
    const canFit = canPlaceAnywhere(piece);
    const alpha = (canFit?1:0.3) * fadeA;

    if (piece.special) {
      // Special block in tray — render with pulse
      const sv = piece.special==='bomb'?SP.BOMB:piece.special==='rainbow'?SP.RAINBOW:SP.LIGHTNING;
      const ts = L.tcs - 2;
      const tx = cx - ts/2;
      const ty = cy - ts/2;
      ctx.globalAlpha = alpha;
      drawSpecialBlock(tx, ty, ts, sv, now);
      ctx.globalAlpha = 1;
    } else {
      for (const [r,c] of piece.c) {
        const x = cx - (piece.cols*L.tcs)/2 + c*L.tcs + 1;
        const y = cy - (piece.rows*L.tcs)/2 + r*L.tcs + 1;
        drawBlock(x, y, L.tcs-2, piece.ci, alpha);
      }
    }
  }

  // Undo button (right side of tray area)
  drawUndoBtn(now);
}

function drawUndoBtn(now) {
  const L = layout;
  // Position: bottom-right of grid, in the gap between grid and tray
  const bw = 64, bh = 28;
  const bx = L.gx + L.gw - bw - 2;
  const by = L.gy + L.gw + (L.trayY - L.gy - L.gw - bh) / 2;

  const usable = !state.undoUsed && state.undoSnap && !state.gameOver;
  ctx.globalAlpha = usable ? 0.85 : 0.2;

  // Pill-shaped background
  ctx.fillStyle = usable ? '#1E2A4A' : '#161E35';
  roundRect(bx, by, bw, bh, bh / 2);
  ctx.fill();
  ctx.strokeStyle = usable ? '#3A5A7A' : '#1E2A4A';
  ctx.lineWidth = 1;
  roundRect(bx, by, bw, bh, bh / 2);
  ctx.stroke();

  const cx = bx + bw / 2, cy = by + bh / 2;

  // Curved arrow icon (left side)
  const ix = cx - 14;
  ctx.strokeStyle = usable ? '#80CBFF' : '#445';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.arc(ix, cy, 5, -Math.PI * 0.85, Math.PI * 0.45);
  ctx.stroke();
  // Arrow head
  const ax = ix + Math.cos(Math.PI * 0.45) * 5;
  const ay = cy + Math.sin(Math.PI * 0.45) * 5;
  ctx.beginPath();
  ctx.moveTo(ax - 3, ay - 2.5);
  ctx.lineTo(ax, ay);
  ctx.lineTo(ax + 3, ay - 2.5);
  ctx.stroke();

  // "UNDO" text (right side)
  ctx.fillStyle = usable ? '#80CBFF' : '#445';
  ctx.font = 'bold 9px "Segoe UI",-apple-system,system-ui,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('UNDO', cx + 10, cy);

  ctx.globalAlpha = 1;

  hitAreas.undo = { x: bx, y: by, w: bw, h: bh };
}

// ============================================================
//  RENDERING — DRAG PIECE
// ============================================================
function drawDragPiece(now) {
  if (!drag.active || !drag.piece) return;
  const L = layout;
  const pickupT = Math.min((now-drag.startTime)/140, 1);
  const eased = easeOutBack(pickupT);
  const cellS = L.tcs + (L.inner-L.tcs)*eased;
  const totalGap = GAP*(cellS/L.inner);
  const yOff = drag.isTouch ? -L.cs*1.8 : 0;

  if (drag.piece.special) {
    const sv = drag.piece.special==='bomb'?SP.BOMB:drag.piece.special==='rainbow'?SP.RAINBOW:SP.LIGHTNING;
    const x = drag.x - cellS/2;
    const y = drag.y + yOff - cellS/2;
    ctx.globalAlpha = 0.88;
    drawSpecialBlock(x, y, cellS, sv, now);
    ctx.globalAlpha = 1;
  } else {
    for (const [r,c] of drag.piece.c) {
      const csG = cellS + totalGap;
      const x = drag.x - (drag.piece.cols*csG)/2 + c*csG + totalGap/2;
      const y = drag.y + yOff - (drag.piece.rows*csG)/2 + r*csG + totalGap/2;
      drawBlock(x, y, cellS, drag.piece.ci, 0.88);
    }
  }
}

// ============================================================
//  RENDERING — ANIMATIONS
// ============================================================
function renderAnims(now) {
  const L = layout;
  for (const a of anims) {
    const t = Math.min((now-a.start)/a.dur, 1);
    if (t<0) continue;

    switch(a.type) {
      case 'place': {
        const glow = (1-easeIn2(t))*0.5;
        for (const cell of a.cells) {
          const x=L.gx+cell.c*L.cs+GAP/2, y=L.gy+cell.r*L.cs+GAP/2;
          ctx.globalAlpha = glow;
          ctx.fillStyle = '#fff';
          roundRect(x,y,L.inner,L.inner,L.inner*0.15);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        break;
      }
      case 'clear': {
        for (const cell of a.cells) {
          const x=L.gx+cell.c*L.cs+GAP/2, y=L.gy+cell.r*L.cs+GAP/2;
          // Bright white flash phase (stronger)
          if (t<0.25) {
            ctx.globalAlpha = (1-t/0.25)*0.9;
            ctx.fillStyle = '#fff';
            // Slightly expand during flash
            const flashScale = 1 + (1-t/0.25)*0.08;
            const fs = L.inner * flashScale;
            const fo = (L.inner - fs) / 2;
            roundRect(x+fo, y+fo, fs, fs, fs*0.15);
            ctx.fill();
          }
          // Shrink + spin-dissolve phase
          const shrinkT = Math.max(0, (t-0.15)/0.85);
          const scale = 1-easeIn2(shrinkT);
          const s = L.inner*scale;
          const ox = (L.inner-s)/2;
          if (s > 1) {
            // Color-tinted glow around dissolving block
            if (shrinkT > 0.1 && shrinkT < 0.7) {
              const c = COLORS[cell.ci % COLORS.length];
              ctx.globalAlpha = (1-shrinkT)*0.25;
              ctx.fillStyle = c.base;
              const gs = s * 1.3;
              const go = (L.inner-gs)/2;
              roundRect(x+go, y+go, gs, gs, gs*0.15);
              ctx.fill();
            }
            drawBlock(x+ox, y+ox, s, cell.ci, (1-easeIn2(t))*0.9);
          }
        }
        ctx.globalAlpha = 1;
        break;
      }
      case 'score': {
        const fade = t<0.08?t/0.08:(1-easeIn2((t-0.08)/0.92));
        const s = t<0.1?1.3-easeOut3(t/0.1)*0.3:1;
        ctx.globalAlpha = Math.max(0,fade);
        // Glow shadow
        ctx.shadowColor = 'rgba(255,220,100,0.5)';
        ctx.shadowBlur = 14;
        ctx.fillStyle = '#FFE680';
        ctx.font = `bold ${Math.round((22+t*12)*s)}px "Segoe UI",-apple-system,system-ui,sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(a.text, a.x, a.y-easeOut3(t)*70);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        break;
      }
      case 'cheer': {
        const scale = t<0.12?1.5-easeOut3(t/0.12)*0.5:1;
        const fade = t>0.55?1-(t-0.55)/0.45:(t<0.06?t/0.06:1);
        ctx.globalAlpha = Math.max(0,fade);
        ctx.fillStyle = a.color;
        ctx.font = `bold ${Math.round(a.size*scale)}px "Segoe UI",-apple-system,system-ui,sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = a.color; ctx.shadowBlur = 10;
        ctx.fillText(a.text, a.x, a.y-easeOut3(t)*25);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        break;
      }
      case 'combo': {
        const s = t<0.15?1.6-easeOut3(t/0.15)*0.6:1;
        const fade = t>0.6?1-(t-0.6)/0.4:(t<0.08?t/0.08:1);
        ctx.globalAlpha = Math.max(0,fade);
        ctx.fillStyle = '#ffd34e';
        ctx.font = `bold ${Math.round(28*s)}px "Segoe UI",-apple-system,system-ui,sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(255,200,0,0.4)'; ctx.shadowBlur = 12;
        ctx.fillText(a.text, a.x, a.y);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        break;
      }
      case 'streakBurst': {
        const scale = t<0.1?1.8-easeOut3(t/0.1)*0.8:1;
        const fade = t>0.5?1-(t-0.5)/0.5:Math.min(t*6,1);
        ctx.globalAlpha = Math.max(0,fade);
        ctx.fillStyle = state.streak>=6?'#ff4466':'#ff8844';
        ctx.font = `bold ${Math.round(a.size*scale)}px "Segoe UI",-apple-system,system-ui,sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(255,100,50,0.5)'; ctx.shadowBlur = 16;
        ctx.fillText(a.text, a.x, a.y);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        break;
      }
      case 'boardFlash': {
        ctx.globalAlpha = (1-t)*0.25;
        ctx.fillStyle = '#fff';
        ctx.fillRect(L.gx-8, L.gy-8, L.gw+16, L.gw+16);
        // Color tint layer
        ctx.globalAlpha = (1-t)*0.08;
        ctx.fillStyle = '#5577FF';
        ctx.fillRect(0, 0, L.w, L.h);
        ctx.globalAlpha = 1;
        break;
      }
      case 'explosion': {
        // Expanding ring
        const radius = easeOut3(t) * L.cs * 2;
        ctx.globalAlpha = (1-t)*0.6;
        ctx.strokeStyle = '#FF6B40';
        ctx.lineWidth = 3*(1-t);
        ctx.beginPath();
        ctx.arc(a.x, a.y, radius, 0, Math.PI*2);
        ctx.stroke();
        // Inner flash
        if (t<0.3) {
          ctx.globalAlpha = (1-t/0.3)*0.5;
          ctx.fillStyle = '#FFD700';
          ctx.beginPath();
          ctx.arc(a.x, a.y, L.cs*(1-t), 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        break;
      }
      case 'beam': {
        // Horizontal light beam across a row
        const row = a.row;
        const by = L.gy + row*L.cs + L.cs/2;
        const beamW = easeOut3(Math.min(t*2,1)) * L.gw;
        const fade = t>0.5?1-(t-0.5)/0.5:1;
        ctx.globalAlpha = fade * 0.7;
        const bg = ctx.createLinearGradient(L.gx, by-L.cs/2, L.gx, by+L.cs/2);
        bg.addColorStop(0, 'rgba(255,255,100,0)');
        bg.addColorStop(0.4, 'rgba(255,255,200,0.8)');
        bg.addColorStop(0.5, 'rgba(255,255,255,1)');
        bg.addColorStop(0.6, 'rgba(255,255,200,0.8)');
        bg.addColorStop(1, 'rgba(255,255,100,0)');
        ctx.fillStyle = bg;
        ctx.fillRect(L.gx + (L.gw-beamW)/2, by-L.cs*0.4, beamW, L.cs*0.8);
        ctx.globalAlpha = 1;
        break;
      }
      case 'missionComplete': {
        const scale = t<0.15?easeOutBack(t/0.15):1;
        const fade = t>0.7?1-(t-0.7)/0.3:1;
        ctx.globalAlpha = Math.max(0,fade);
        ctx.fillStyle = '#4CAF50';
        ctx.font = `bold ${Math.round(18*scale)}px "Segoe UI",-apple-system,system-ui,sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = '#4CAF50'; ctx.shadowBlur = 8;
        ctx.fillText(a.text, a.x, a.y - easeOut3(t)*30);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        break;
      }
      case 'goStatPop': {
        // Game over stat pop-in
        const s = t<0.2?easeOutBack(t/0.2):1;
        const fade = Math.min(t*5,1);
        ctx.globalAlpha = fade;
        ctx.fillStyle = a.color||'#AABBCC';
        ctx.font = `${a.bold?'bold ':''}${Math.round((a.fontSize||14)*s)}px "Segoe UI",-apple-system,system-ui,sans-serif`;
        ctx.textAlign = a.align||'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(a.text, a.x, a.y);
        ctx.globalAlpha = 1;
        break;
      }
      case 'newRecord': {
        const CUTE = '"Nunito","Comic Neue","Segoe UI",sans-serif';
        // Phase 1: golden screen flash (0-0.15)
        if (t < 0.15) {
          const flashT = t / 0.15;
          ctx.globalAlpha = (1 - flashT) * 0.35;
          ctx.fillStyle = '#FFD700';
          ctx.fillRect(0, 0, L.w, L.h);
          ctx.globalAlpha = 1;
        }
        // Phase 2: trophy + text zoom in (0.05-0.4)
        const enterT = Math.max(0, Math.min((t - 0.05) / 0.3, 1));
        const exitT = Math.max(0, (t - 0.75) / 0.25);
        const scale = enterT < 1 ? easeOutBack(enterT) : 1;
        const fade = exitT > 0 ? 1 - easeIn2(exitT) : Math.min(enterT * 3, 1);
        if (fade > 0.01) {
          ctx.globalAlpha = fade;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          // Glowing trophy
          const tSize = Math.round(48 * scale);
          ctx.shadowColor = 'rgba(255,215,0,0.8)'; ctx.shadowBlur = 30;
          ctx.font = `${tSize}px "Segoe UI"`;
          ctx.fillText('\uD83C\uDFC6', a.x, a.y - 20 * scale);
          ctx.shadowBlur = 0;
          // "NEW RECORD!" text with golden gradient
          const fontSize = Math.round(32 * scale);
          const textY = a.y + 30 * scale;
          ctx.font = `900 ${fontSize}px ` + CUTE;
          // Gold gradient
          const tg = ctx.createLinearGradient(a.x - 100, textY, a.x + 100, textY);
          tg.addColorStop(0, '#FFD700');
          tg.addColorStop(0.3, '#FFF8DC');
          tg.addColorStop(0.5, '#FFD700');
          tg.addColorStop(0.7, '#FFF8DC');
          tg.addColorStop(1, '#FFD700');
          ctx.fillStyle = tg;
          ctx.shadowColor = 'rgba(255,200,0,0.6)'; ctx.shadowBlur = 16;
          ctx.fillText('\u65B0\u7D00\u9304!', a.x, textY);
          ctx.shadowBlur = 0;
          // Subtitle
          ctx.fillStyle = '#FFE680';
          ctx.font = `bold ${Math.round(16 * scale)}px ` + CUTE;
          ctx.fillText('NEW RECORD!', a.x, textY + 28 * scale);
          // Pulsing glow ring
          if (t > 0.1 && t < 0.7) {
            const ringT = ((t - 0.1) / 0.6) % 1;
            const ringR = 40 + ringT * 120;
            ctx.globalAlpha = fade * (1 - ringT) * 0.4;
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3 * (1 - ringT);
            ctx.beginPath();
            ctx.arc(a.x, a.y + 10, ringR, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }
        break;
      }
    }
  }
}

function drawToggle(x, y, label, on, key) {
  const w=140, h=36, tw=50, th=26;
  ctx.fillStyle = '#8899AA';
  ctx.font = '15px "Nunito","Segoe UI",sans-serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y+h/2);

  const tx = x+w-tw, ty = y+(h-th)/2;
  // Track
  ctx.fillStyle = on ? 'rgba(76,175,80,0.3)' : 'rgba(255,255,255,0.08)';
  roundRect(tx,ty,tw,th,th/2);
  ctx.fill();
  ctx.strokeStyle = on ? '#4CAF50' : '#445';
  ctx.lineWidth = 1;
  roundRect(tx,ty,tw,th,th/2);
  ctx.stroke();
  // Knob
  const kx = on ? tx+tw-th+2 : tx+2;
  ctx.fillStyle = on ? '#4CAF50' : '#667';
  ctx.beginPath();
  ctx.arc(kx+th/2-2, ty+th/2, th/2-4, 0, Math.PI*2);
  ctx.fill();

  hitAreas[key+'Toggle'] = {x:tx, y:ty, w:tw, h:th};
}

function renderGameOverOverlay(now) {
  const L = layout;
  const CUTE = '"Nunito","Comic Neue","Segoe UI",sans-serif';
  const t = Math.min((now-state.goAnimStart)/800, 1);

  // Row-by-row gray-out
  const rowsDone = Math.floor(easeOut3(t)*GRID);
  for (let r=0;r<rowsDone;r++) for (let c=0;c<GRID;c++) {
    const x=L.gx+c*L.cs+GAP/2, y=L.gy+r*L.cs+GAP/2;
    ctx.globalAlpha = 0.65;
    ctx.fillStyle = '#161E35';
    roundRect(x,y,L.inner,L.inner,L.inner*0.15);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  if (t<1) return;

  // Frosted glass overlay
  ctx.fillStyle = 'rgba(8,12,24,0.90)';
  ctx.fillRect(0,0,L.w,L.h);

  const cx = L.w/2;
  const elapsed = now - state.goAnimStart - 800;

  // Panel card
  const pw=300, ph=420, px=cx-pw/2, py=(L.h-ph)/2-10;
  ctx.fillStyle = 'rgba(22,30,53,0.95)';
  roundRect(px,py,pw,ph,20); ctx.fill();
  ctx.strokeStyle = 'rgba(100,150,255,0.12)';
  ctx.lineWidth = 1;
  roundRect(px,py,pw,ph,20); ctx.stroke();

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Cute title
  let cy = py+45;
  ctx.shadowColor = 'rgba(255,100,100,0.3)'; ctx.shadowBlur = 15;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px '+CUTE;
  ctx.fillText('\uD83D\uDE35 \u904A\u6232\u7D50\u675F!', cx, cy);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#8899AA';
  ctx.font = '600 14px '+CUTE;
  ctx.fillText('Game Over', cx, cy+26);

  // Big score with sparkles
  cy += 66;
  ctx.fillStyle = '#FFE680';
  ctx.font = 'bold 44px '+CUTE;
  ctx.shadowColor = 'rgba(255,220,100,0.4)'; ctx.shadowBlur = 20;
  ctx.fillText('\u2728 '+state.score.toLocaleString()+' \u2728', cx, cy);
  ctx.shadowBlur = 0;

  // Stats section
  cy += 42;
  ctx.fillStyle = '#8899AA';
  ctx.font = '600 13px '+CUTE;
  ctx.fillText('\uD83D\uDCCA \u6210\u7E3E\u55AE', cx, cy);

  cy += 22;
  const stats = [
    {label:'\u6D88\u9664\u884C\u6578 Lines', value:String(state.stats.linesCleared), color:'#AABBCC'},
    {label:'\u6700\u5927 Combo', value:'x'+state.stats.maxCombo, color:'#AABBCC'},
    {label:'\u6700\u9577\u9023\u64CA Streak', value:'x'+state.stats.longestStreak, color:'#AABBCC'},
    {label:'\u4EFB\u52D9 Mission', value:state.mission.completed?'\u2705 +'+state.mission.reward:'\u2014',
     color:state.mission.completed?'#4CAF50':'#667788'},
  ];
  stats.forEach((s,i)=>{
    const delay = i*150;
    const st = Math.max(0, Math.min((elapsed-delay)/300, 1));
    if (st<=0) return;
    const scale = easeOutBack(st);
    ctx.globalAlpha = Math.min(st*3,1);
    ctx.fillStyle = '#667788';
    ctx.font = `${Math.round(12*scale)}px `+CUTE;
    ctx.textAlign = 'left';
    ctx.fillText(s.label, cx-110, cy+i*26);
    ctx.fillStyle = s.color;
    ctx.font = `bold ${Math.round(14*scale)}px `+CUTE;
    ctx.textAlign = 'right';
    ctx.fillText(s.value, cx+110, cy+i*26);
  });
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center';

  // Best score
  cy += stats.length*26 + 14;
  ctx.fillStyle = '#ffd34e';
  ctx.font = 'bold 15px '+CUTE;
  ctx.fillText('\uD83C\uDFC6 \u6700\u9AD8 '+state.best.toLocaleString(), cx, cy);

  // Rewarded ad button — only in level mode, only once per round, only if ad is ready
  if (gameMode === 'level' && !_adUsedThisRound && _adReady) {
    cy += 30;
    const aw=210, ah=44;
    const ax=cx-aw/2;
    const ag = ctx.createLinearGradient(ax,cy,ax+aw,cy+ah);
    ag.addColorStop(0,'#FF9800'); ag.addColorStop(1,'#FFB74D');
    ctx.fillStyle = ag;
    roundRect(ax,cy,aw,ah,ah/2); ctx.fill();
    ctx.shadowColor = 'rgba(255,152,0,0.3)'; ctx.shadowBlur = 10;
    roundRect(ax,cy,aw,ah,ah/2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 15px '+CUTE;
    ctx.textAlign = 'center';
    ctx.fillText('\uD83D\uDCFA \u770B\u5EE3\u544A +3\u6B65 Watch Ad', cx, cy+ah/2);
    hitAreas.rewardAd = {x:ax, y:cy, w:aw, h:ah};
    cy += ah + 8;
  } else {
    hitAreas.rewardAd = null;
  }

  // Retry button
  cy += 32;
  const bw=210, bh=48;
  const bx=cx-bw/2;
  ctx.shadowColor = 'rgba(80,110,255,0.35)'; ctx.shadowBlur = 16;
  const bg = ctx.createLinearGradient(bx,cy,bx+bw,cy+bh);
  bg.addColorStop(0,'#5577FF'); bg.addColorStop(1,'#9944FF');
  ctx.fillStyle = bg;
  roundRect(bx,cy,bw,bh,bh/2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 17px '+CUTE;
  ctx.fillText('\uD83D\uDD04 \u518D\u4F86 Retry', cx, cy+bh/2);
  hitAreas.restart = {x:bx,y:cy,w:bw,h:bh};

  // Home button
  const hy = cy+bh+14;
  ctx.strokeStyle = 'rgba(136,153,170,0.5)';
  ctx.lineWidth = 2;
  roundRect(bx,hy,bw,bh,bh/2); ctx.stroke();
  ctx.fillStyle = '#8899AA';
  ctx.font = 'bold 17px '+CUTE;
  ctx.fillText('\uD83C\uDFE0 \u56DE\u9996\u9801 Home', cx, hy+bh/2);
  hitAreas.goHome = {x:bx,y:hy,w:bw,h:bh};
}

// ============================================================
//  RENDERING — TUTORIAL
// ============================================================
const TUTORIAL_STEPS = [
  {text:'Drag pieces from the tray\nonto the board', target:'tray'},
  {text:'Fill a complete row or column\nto clear it!', target:'row'},
  {text:'Clear multiple lines for\ncombos and streaks!', target:'score'},
  {text:'Watch for special blocks:\nBomb, Rainbow, Lightning!', target:'center'},
];

function renderTutorialOverlay(now) {
  const L = layout;
  const step = TUTORIAL_STEPS[tutorialStep];
  if (!step) return;

  // Dark overlay with spotlight hole
  let spotX, spotY, spotW, spotH;
  switch(step.target) {
    case 'tray':
      spotX=L.gx-8; spotY=L.trayY-12; spotW=L.gw+16; spotH=L.trayH+24;
      break;
    case 'row':
      spotX=L.gx-4; spotY=L.gy+3*L.cs-4; spotW=L.gw+8; spotH=L.cs+8;
      break;
    case 'score':
      spotX=L.gx-4; spotY=4; spotW=L.gw+8; spotH=L.headerH-4;
      break;
    case 'center':
      spotX=L.gx+L.gw/2-L.cs*1.5; spotY=L.gy+L.gw/2-L.cs*1.5;
      spotW=L.cs*3; spotH=L.cs*3;
      break;
  }

  // Draw 4 rects around spotlight
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, L.w, spotY);
  ctx.fillRect(0, spotY+spotH, L.w, L.h-spotY-spotH);
  ctx.fillRect(0, spotY, spotX, spotH);
  ctx.fillRect(spotX+spotW, spotY, L.w-spotX-spotW, spotH);

  // Spotlight border glow
  ctx.strokeStyle = 'rgba(100,150,255,0.4)';
  ctx.lineWidth = 2;
  roundRect(spotX, spotY, spotW, spotH, 8);
  ctx.stroke();

  // Text bubble
  const cx = L.w/2;
  const bubbleY = spotY > L.h/2 ? spotY - 80 : spotY + spotH + 20;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Bubble background
  const bw = 260, bh = 60;
  ctx.fillStyle = 'rgba(30,42,64,0.95)';
  roundRect(cx-bw/2, bubbleY, bw, bh, 12);
  ctx.fill();
  ctx.strokeStyle = 'rgba(100,150,255,0.3)';
  ctx.lineWidth = 1;
  roundRect(cx-bw/2, bubbleY, bw, bh, 12);
  ctx.stroke();

  // Text
  ctx.fillStyle = '#fff';
  ctx.font = '14px "Segoe UI",-apple-system,system-ui,sans-serif';
  const lines = step.text.split('\n');
  lines.forEach((line,i) => {
    ctx.fillText(line, cx, bubbleY + bh/2 - (lines.length-1)*9 + i*18);
  });

  // Step indicator
  const dotY = bubbleY + bh + 16;
  for (let i=0; i<TUTORIAL_STEPS.length; i++) {
    ctx.fillStyle = i===tutorialStep ? '#5577FF' : '#334';
    ctx.beginPath();
    ctx.arc(cx - (TUTORIAL_STEPS.length-1)*8 + i*16, dotY, 4, 0, Math.PI*2);
    ctx.fill();
  }

  // Tap to continue
  const pulse = 0.5 + Math.sin(now*0.004)*0.3;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#8899AA';
  ctx.font = '12px "Segoe UI",-apple-system,system-ui,sans-serif';
  ctx.fillText('Tap to continue', cx, dotY + 22);
  ctx.globalAlpha = 1;
}
