//  RENDERING — LEVEL SELECT
// ============================================================
function renderLevelSelect(now) {
  const L = layout;
  const CUTE = '"Nunito","Comic Neue","Segoe UI",sans-serif';
  const w = WORLDS[levelSelectWorld];
  const cx = L.w/2;

  // World-themed background
  const bg = ctx.createRadialGradient(cx, L.h*0.35, 0, cx, L.h*0.35, L.w*0.95);
  bg.addColorStop(0, w.bg1); bg.addColorStop(1, w.bg2);
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,L.w,L.h);

  // Themed bokeh
  ctx.globalAlpha = 0.06;
  for (let i=0;i<12;i++) {
    const bx = (L.w*0.1)+((i*73+now*0.01)%L.w);
    const by = (L.h*0.1)+((i*97+now*0.008)%L.h);
    const br = 15+i*3;
    const grd = ctx.createRadialGradient(bx,by,0,bx,by,br);
    grd.addColorStop(0,w.bokeh); grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // World title
  let ty = 50;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px '+CUTE;
  ctx.shadowColor = w.bokeh; ctx.shadowBlur = 15;
  ctx.fillText(w.name, cx, ty);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#8899AA';
  ctx.font = '14px '+CUTE;
  ctx.fillText(w.nameEn, cx, ty+28);

  // Back button
  const bbw=44, bbh=36;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  roundRect(16, ty-bbh/2, bbw, bbh, 10); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '20px '+CUTE;
  ctx.textAlign = 'center';
  ctx.fillText('\u2190', 16+bbw/2, ty);
  hitAreas.lsBack = {x:16, y:ty-bbh/2, w:bbw, h:bbh};

  // Level grid — 5 levels per world, displayed as circles
  const startIdx = levelSelectWorld * 5;
  const cols = 3, gridGap = 22;
  const nodeSize = Math.min(60, (L.w-80)/cols - gridGap);
  const startY = ty + 70;

  hitAreas.levelNodes = [];
  for (let i=0; i<5; i++) {
    const lvl = LEVELS[startIdx + i];
    if (!lvl) continue;
    const row = Math.floor(i/cols);
    const col = i % cols;
    const rowCount = row===0 ? Math.min(cols,5) : 5-cols;
    const rowOff = (L.w - rowCount*(nodeSize+gridGap) + gridGap) / 2;
    const nx = rowOff + col*(nodeSize+gridGap) + nodeSize/2;
    const ny = startY + row*(nodeSize+gridGap+20) + nodeSize/2;
    const unlocked = isLevelUnlocked(lvl.id);
    const stars = getLevelStars(lvl.id);

    // Node circle
    if (unlocked) {
      const ng = ctx.createRadialGradient(nx,ny,0,nx,ny,nodeSize/2);
      ng.addColorStop(0, w.bokeh+'44'); ng.addColorStop(1, w.bokeh+'11');
      ctx.fillStyle = ng;
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
    }
    ctx.beginPath();
    ctx.arc(nx, ny, nodeSize/2, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = unlocked ? w.bokeh : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(nx, ny, nodeSize/2, 0, Math.PI*2);
    ctx.stroke();

    // Level number or lock
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (unlocked) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px '+CUTE;
      ctx.fillText(String(lvl.id), nx, ny-4);
      // Stars below number
      const starY = ny+14;
      for (let s=0;s<3;s++) {
        ctx.font = '12px sans-serif';
        ctx.fillText(s<stars?'\u2B50':'\u2606', nx-14+s*14, starY);
      }
    } else {
      ctx.font = `${Math.round(nodeSize*0.4)}px sans-serif`;
      ctx.fillText('\uD83D\uDD12', nx, ny);
    }

    hitAreas.levelNodes.push({x:nx-nodeSize/2, y:ny-nodeSize/2, w:nodeSize, h:nodeSize, lvl:lvl, unlocked});
  }

  // World navigation arrows
  const arrY = startY + Math.ceil(5/cols)*(nodeSize+gridGap+20) + 30;
  const arrSize = 40;

  // Left arrow
  if (levelSelectWorld > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath(); ctx.arc(cx-60, arrY, arrSize/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '20px '+CUTE;
    ctx.fillText('\u2190', cx-60, arrY);
    hitAreas.lsLeft = {x:cx-60-arrSize/2, y:arrY-arrSize/2, w:arrSize, h:arrSize};
  }
  // World dots
  for (let wi=0;wi<WORLDS.length;wi++) {
    ctx.fillStyle = wi===levelSelectWorld ? w.bokeh : '#334';
    ctx.beginPath();
    ctx.arc(cx-24+wi*16, arrY, 5, 0, Math.PI*2);
    ctx.fill();
  }
  // Right arrow
  if (levelSelectWorld < WORLDS.length-1) {
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath(); ctx.arc(cx+60, arrY, arrSize/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '20px '+CUTE;
    ctx.fillText('\u2192', cx+60, arrY);
    hitAreas.lsRight = {x:cx+60-arrSize/2, y:arrY-arrSize/2, w:arrSize, h:arrSize};
  }
}

// ============================================================
//  RENDERING — LEVEL CLEAR
// ============================================================
function renderLevelClear(now) {
  const L = layout;
  const CUTE = '"Nunito","Comic Neue","Segoe UI",sans-serif';
  const cx = L.w/2;
  const elapsed = now - levelClearTime;

  // Overlay
  ctx.fillStyle = 'rgba(8,12,24,0.90)';
  ctx.fillRect(0,0,L.w,L.h);

  // Panel
  const pw=300, ph=360, px=cx-pw/2, py=(L.h-ph)/2-10;
  ctx.fillStyle = 'rgba(22,30,53,0.95)';
  roundRect(px,py,pw,ph,20); ctx.fill();
  ctx.strokeStyle = 'rgba(100,200,100,0.2)';
  ctx.lineWidth = 1;
  roundRect(px,py,pw,ph,20); ctx.stroke();

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Title
  let cy = py+48;
  ctx.shadowColor = 'rgba(100,255,100,0.4)'; ctx.shadowBlur = 20;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 30px '+CUTE;
  ctx.fillText('\uD83C\uDF89 \u904E\u95DC\uFF01', cx, cy);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#8899AA';
  ctx.font = '600 14px '+CUTE;
  ctx.fillText('Level Clear!', cx, cy+28);

  // Stars animation — fly in one by one
  cy += 70;
  for (let s=0; s<3; s++) {
    const delay = 400 + s*300;
    const st = Math.max(0, Math.min((elapsed-delay)/400, 1));
    if (st<=0) continue;
    const scale = easeOutBack(st);
    const earned = s < levelStarsEarned;
    ctx.font = `${Math.round(36*scale)}px sans-serif`;
    ctx.globalAlpha = earned ? 1 : 0.2;
    ctx.fillText(earned?'\u2B50':'\u2606', cx-44+s*44, cy);
  }
  ctx.globalAlpha = 1;

  // Score
  cy += 44;
  ctx.fillStyle = '#FFE680';
  ctx.font = 'bold 28px '+CUTE;
  ctx.fillText(state.score.toLocaleString(), cx, cy);

  // Next level button
  cy += 50;
  const bw=210, bh=48, bx=cx-bw/2;
  const nextLvl = currentLevel && currentLevel.id < LEVELS.length;
  if (nextLvl) {
    const bg = ctx.createLinearGradient(bx,cy,bx+bw,cy+bh);
    bg.addColorStop(0,'#4CAF50'); bg.addColorStop(1,'#2E8B31');
    ctx.fillStyle = bg;
    roundRect(bx,cy,bw,bh,bh/2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 17px '+CUTE;
    ctx.fillText('\u25B6 \u4E0B\u4E00\u95DC Next', cx, cy+bh/2);
    hitAreas.lcNext = {x:bx,y:cy,w:bw,h:bh};
  }

  // Replay button
  const ry = cy + (nextLvl?bh+12:0);
  ctx.strokeStyle = 'rgba(136,153,170,0.5)';
  ctx.lineWidth = 2;
  roundRect(bx,ry,bw,bh,bh/2); ctx.stroke();
  ctx.fillStyle = '#8899AA';
  ctx.font = 'bold 17px '+CUTE;
  ctx.fillText('\uD83D\uDD04 \u91CD\u73A9 Replay', cx, ry+bh/2);
  hitAreas.lcReplay = {x:bx,y:ry,w:bw,h:bh};

  // Back to level select
  const by = ry+bh+12;
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  roundRect(bx,by,bw,bh,bh/2); ctx.fill();
  ctx.fillStyle = '#667788';
  ctx.font = 'bold 15px '+CUTE;
  ctx.fillText('\uD83D\uDDFA \u9078\u95DC Levels', cx, by+bh/2);
  hitAreas.lcLevels = {x:bx,y:by,w:bw,h:bh};

  // Celebration particles
  if (elapsed < 2000 && elapsed > 300) {
    if (Math.random() < 0.3) {
      spawnParticles(cx+(Math.random()-0.5)*200, py-10, Math.floor(Math.random()*10), 3,
        {star:true, speed:2, speedVar:3, upBias:2, gravity:0.08, minSize:1.5, maxSize:3});
    }
  }
}

function renderLevelBrief(now) {

  const cx = L.w/2, cy = L.h/2;

  ctx.fillStyle = '#fff';

  ctx.fillText('Level '+currentLevel.id, cx, py+62);

  // Divider line
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px+30, py+84); ctx.lineTo(px+pw-30, py+84); ctx.stroke();

  // Goal icon + text — big and clear
  const goalY = py + 118;
  const goalIcons = { score:'🎯', lines:'📏', clear_color:'🟦', clear_obstacles:'💥' };
  const goalDescs = {
    score: '得到 '+currentLevel.target+' 分',
    lines: '消除 '+currentLevel.target+' 行',
    clear_color: '消除 '+currentLevel.target+' 個指定色方塊',
    clear_obstacles: '清除所有障礙物'
  };
  ctx.fillStyle = '#FFE680';
  ctx.font = 'bold 20px '+CUTE;
  ctx.fillText((goalIcons[currentLevel.goal]||'🎯')+' '+goalDescs[currentLevel.goal], cx, goalY);

  // Moves limit
  ctx.fillStyle = '#8899BB';
  ctx.font = '600 15px '+CUTE;
  ctx.fillText('🧩 步數限制：'+currentLevel.moves+' 步', cx, goalY + 36);

  // Obstacles preview
  const obs = currentLevel.obstacles || [];
  if (obs.length > 0) {
    const obsY = goalY + 72;
    ctx.fillStyle = '#667788';
    ctx.font = '13px '+CUTE;
    ctx.fillText('⚠️ 障礙物', cx, obsY);

    const obsNames = { stone:'🪨 石頭', ice:'🧊 冰塊', locked:'🔒 鎖定格' };
    const obsStr = obs.map(o => (obsNames[o.type]||o.type)+' ×'+o.count).join('   ');
    ctx.fillStyle = '#AABBCC';
    ctx.font = 'bold 14px '+CUTE;
    ctx.fillText(obsStr, cx, obsY + 22);
  }

  // Stars thresholds
  const starsY = goalY + (obs.length > 0 ? 118 : 82);
  ctx.fillStyle = '#667788';
  ctx.font = '12px '+CUTE;
  ctx.fillText('⭐ 星級目標', cx, starsY);

  const starLabels = currentLevel.goal === 'clear_obstacles'
    ? ['過關','過關','過關']
    : currentLevel.stars.map(s => currentLevel.goal === 'score' ? s+'分'
        : currentLevel.goal === 'lines' ? s+'行' : s+'個');
  ctx.font = 'bold 13px '+CUTE;
  const sw = pw / 3;
  for (let i = 0; i < 3; i++) {
    const sx = px + sw*i + sw/2;
    ctx.fillStyle = '#FFD700';
    ctx.fillText('⭐'.repeat(i+1), sx, starsY+20);
    ctx.fillStyle = '#AABBCC';
    ctx.fillText(starLabels[i], sx, starsY+38);
  }

  // GO button
  const bw = 180, bh = 52;
  const bx = cx-bw/2, by = py+ph-70;
  const gg = ctx.createLinearGradient(bx,by,bx+bw,by+bh);
  gg.addColorStop(0,'#FF9800'); gg.addColorStop(1,'#F44336');
  ctx.fillStyle = gg;
  roundRect(bx, by, bw, bh, bh/2); ctx.fill();
  ctx.shadowColor = 'rgba(255,152,0,0.4)'; ctx.shadowBlur = 16;
  roundRect(bx, by, bw, bh, bh/2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px '+CUTE;
  ctx.fillText('▶ GO!', cx, by+bh/2);
  hitAreas.briefGo = {x:bx, y:by, w:bw, h:bh};

  // Back button (top-left)
  ctx.fillStyle = '#667788';
  ctx.font = '15px '+CUTE;
  ctx.textAlign = 'left';
  ctx.fillText('← 返回', px+12, py+28);
  hitAreas.briefBack = {x:px, y:py+10, w:60, h:36};

  ctx.globalAlpha = 1;
}

// ============================================================
//  RENDERING — LEVEL HUD (moves left + goal progress)
// ============================================================
function drawLevelHUD(now) {
  if (gameMode !== 'level' || !currentLevel) return;
  const L = layout;
  const CUTE = '"Nunito","Segoe UI",sans-serif';

  // Moves counter — top left area below score
  const mx = L.gx, my = L.headerH + L.missionH + 2;

  // Goal info — right side
  const gx = L.gx + L.gw;
  const goalText = getLevelGoalText();
  const progressText = getLevelProgressText();

  // Moves pill
  const mw = 80, mh = 22;
  const lowMoves = state.movesLeft <= 3;
  ctx.fillStyle = lowMoves ? 'rgba(244,67,54,0.15)' : 'rgba(255,255,255,0.06)';
  roundRect(mx, my, mw, mh, mh/2); ctx.fill();
  ctx.fillStyle = lowMoves ? '#F44336' : '#8899AA';
  ctx.font = 'bold 11px '+CUTE;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('\u6B65\u6578 '+state.movesLeft, mx+10, my+mh/2);

  // Goal pill
  const goalW = 130;
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  roundRect(gx-goalW, my, goalW, mh, mh/2); ctx.fill();
  ctx.fillStyle = '#8899AA';
  ctx.font = '11px '+CUTE;
  ctx.textAlign = 'right';
  ctx.fillText(goalText+' '+progressText, gx-8, my+mh/2);
}

function getLevelGoalText() {
  if (!currentLevel) return '';
  switch(currentLevel.goal) {
    case 'score': return '\uD83C\uDFAF '+currentLevel.target+'\u5206';
    case 'lines': return '\uD83D\uDCCF '+currentLevel.target+'\u884C';
    case 'clear_color': return '\uD83D\uDFE6 \u6D88'+currentLevel.target+'\u500B';
    case 'clear_obstacles': return '\uD83D\uDCA5 \u6E05\u969C\u7919';
  }
  return '';
}

function getLevelProgressText() {
  if (!currentLevel) return '';
  switch(currentLevel.goal) {
    case 'score': return '('+state.score+'/'+currentLevel.target+')';
    case 'lines': return '('+state.stats.linesCleared+'/'+currentLevel.target+')';
    case 'clear_color': return '('+(state.colorCleared[currentLevel.targetColor||0]||0)+'/'+currentLevel.target+')';
    case 'clear_obstacles': return '('+state.obstaclesRemaining+')';
  }
  return '';
}

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px '+CUTE;
    ctx.textAlign = 'center';
    ctx.fillText('LINE \u767B\u5165', lbtnX+lbtnW/2, lbtnY+lbtnH/2);
    hitAreas.lineLogin = {x:lbtnX, y:lbtnY, w:lbtnW, h:lbtnH};
    // Hint: in iframe, login opens new tab
    if (inIframe) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '9px '+CUTE;
      ctx.fillText('\u2197 \u65B0\u8996\u7A97\u958B\u555F', lbtnX+lbtnW/2, lbtnY+lbtnH+10);
    }
  }

  // Leaderboard entries
  const startY = 95;
  const rowH = 44;
  const lbw = Math.min(L.w-32, 360);
  const lbx = cx - lbw/2;

  const entries = leaderboardData.length > 0 ? leaderboardData : [];

  if (entries.length === 0 && !lbLoading) {
    // Empty state
    ctx.fillStyle = '#556677';
    ctx.font = '15px '+CUTE;
    ctx.textAlign = 'center';
    ctx.fillText(lineUser ? '\u9084\u6C92\u6709\u6392\u884C\u8CC7\u6599' : '\u767B\u5165 LINE \u5F8C\u53EF\u4E0A\u50B3\u5206\u6578', cx, startY+60);
    ctx.fillText(lineUser ? '\u73A9\u904E\u904A\u6232\u5F8C\u5206\u6578\u6703\u81EA\u52D5\u4E0A\u50B3' : '', cx, startY+82);
  }

  if (lbLoading && entries.length === 0) {
    ctx.fillStyle = '#8899AA';
    ctx.font = '14px '+CUTE;
    ctx.textAlign = 'center';
    ctx.fillText('\u8F09\u5165\u4E2D...', cx, startY+60);
  }

  // Find current user's rank
  let myRank = -1;
  if (lineUser) {
    myRank = entries.findIndex(e => e.uid === lineUser.uid);
  }

  const maxShow = Math.min(entries.length, 10);
  for (let i = 0; i < maxShow; i++) {
    const entry = entries[i];
    const ey = startY + i*rowH;
    const isTop3 = i < 3;
    const isMe = lineUser && entry.uid === lineUser.uid;

    // Row background
    ctx.fillStyle = isMe ? 'rgba(85,119,255,0.12)' : isTop3 ? 'rgba(255,200,60,0.06)' : 'rgba(255,255,255,0.03)';
    roundRect(lbx, ey, lbw, rowH-4, 8); ctx.fill();
    if (isMe) {
      ctx.strokeStyle = 'rgba(85,119,255,0.4)';
      ctx.lineWidth = 1;
      roundRect(lbx, ey, lbw, rowH-4, 8); ctx.stroke();
    }

    // Rank
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const rankEmoji = i===0?'\uD83E\uDD47':i===1?'\uD83E\uDD48':i===2?'\uD83E\uDD49':'';
    ctx.font = 'bold 16px '+CUTE;
    ctx.fillStyle = isTop3 ? '#ffd34e' : '#667788';
    ctx.fillText(rankEmoji || String(i+1), lbx+22, ey+rowH/2-2);

    // Avatar — LINE profile picture or fallback
    const acx = lbx+56, acy = ey+rowH/2-2;
    if (entry.avatarImg && entry.avatarImg.complete && entry.avatarImg.naturalWidth > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(acx, acy, 14, 0, Math.PI*2);
      ctx.clip();
      ctx.drawImage(entry.avatarImg, acx-14, acy-14, 28, 28);
      ctx.restore();
    } else {
      ctx.fillStyle = COLORS[i%COLORS.length].base;
      ctx.beginPath(); ctx.arc(acx, acy, 14, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px '+CUTE;
      ctx.textAlign = 'center';
      ctx.fillText(entry.name ? entry.name[0] : '?', acx, acy);

    // Name
    ctx.textAlign = 'left';
    ctx.fillStyle = isMe ? '#AACCFF' : '#DDEEFF';
    ctx.font = (isMe?'bold ':'600 ')+'14px '+CUTE;
    const dispName = entry.name || 'Player';
    ctx.fillText(dispName.length>10?dispName.slice(0,10)+'..':dispName, lbx+78, acy);

    // Score
    ctx.textAlign = 'right';
    ctx.fillStyle = '#FFE680';
    ctx.font = 'bold 14px '+CUTE;
    ctx.fillText(entry.score.toLocaleString(), lbx+lbw-12, acy);
  }

  // Your score at bottom (always show)
  const myY = startY + maxShow*rowH + 12;
  ctx.fillStyle = 'rgba(85,119,255,0.1)';
  roundRect(lbx, myY, lbw, rowH, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(85,119,255,0.3)';
  ctx.lineWidth = 1;
  roundRect(lbx, myY, lbw, rowH, 8); ctx.stroke();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#5577FF';
  ctx.font = 'bold 14px '+CUTE;
  if (lineUser) {
    const rankStr = myRank >= 0 ? '#'+(myRank+1)+' ' : '';
    ctx.fillText(rankStr + lineUser.name + '  ' + settings.bestScore.toLocaleString(), cx, myY+rowH/2);
  } else {
    ctx.fillText('\u4F60  '+settings.bestScore.toLocaleString(), cx, myY+rowH/2);
  }

  // Status text
  const noteY = myY + rowH + 18;
  ctx.fillStyle = '#556677';
  ctx.font = '11px '+CUTE;
  ctx.textAlign = 'center';
  if (!lineUser) {
    ctx.fillText('\u2139\uFE0F LINE \u767B\u5165\u5F8C\u5206\u6578\u81EA\u52D5\u4E0A\u50B3\u6392\u884C\u699C', cx, noteY);
  } else if (lbLoading) {
    ctx.fillText('\u2615 \u66F4\u65B0\u4E2D...', cx, noteY);
  } else {
    ctx.fillText('\u2705 \u5DF2\u767B\u5165\u70BA ' + lineUser.name, cx, noteY);
  }
}

// ============================================================
//  MAIN RENDER
// ============================================================
function render(now) {
  const L = layout;

  // Animated score
  if (screen !== SCR.MENU) {
    if (displayScore !== state.score) {
      displayScore += (state.score - displayScore) * 0.14;
      if (Math.abs(state.score - displayScore) < 1) displayScore = state.score;
    }
  }

  if (screen === SCR.PLAYING || screen === SCR.TUTORIAL || screen === SCR.LEVEL_CLEAR) updateParticles();

  // Screen shake
  let sx=0, sy=0;
  for (const a of anims) {
    if (a.type==='shake') {
      const t = (now-a.start)/a.dur;
      if (t>=0 && t<1) {
        const i = a.intensity*(1-t);
        sx += (Math.random()-0.5)*i*2;
        sy += (Math.random()-0.5)*i*2;
      }
    }
  }

  ctx.save();
  ctx.translate(sx, sy);

  if (screen === SCR.LEVEL_SELECT) {
    renderLevelSelect(now);
  } else if (screen === SCR.LEADERBOARD) {
    renderLeaderboard(now);
  } else if (screen === SCR.LEVEL_BRIEF) {
    renderLevelBrief(now);
  } else {
    drawBackground();

    if (screen === SCR.MENU) {
      renderMenu(now);
    } else {
      drawHeader(now);
      if (gameMode === 'level') {
        drawLevelHUD(now);
      } else {
        drawMissionBar(now);
      }
      drawGrid(now);
      drawGhostPreview(now);
      drawTray(now);
      drawDragPiece(now);
      renderAnims(now);
      renderParticles();

      if (screen === SCR.PAUSED)    renderPauseOverlay(now);
      if (screen === SCR.GAME_OVER) renderGameOverOverlay(now);
      if (screen === SCR.TUTORIAL)  renderTutorialOverlay(now);
      if (screen === SCR.LEVEL_CLEAR) {
        renderLevelClear(now);
        renderParticles();
      }
    }
  }

  ctx.restore();

  // BGM debug indicator (temporary — remove after BGM fix confirmed)
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,0,0.7)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.fillText('BGM:' + _bgmDebug + ' m:' + (settings.musicOn?'ON':'OFF'), layout.w-4, 2);
  ctx.restore();

  // Clean expired anims
  for (let i=anims.length-1; i>=0; i--) {
    if (now-anims[i].start >= anims[i].dur) anims.splice(i,1);
  }
}

// ============================================================
//  INPUT
// ============================================================
function getPointerPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : (e.changedTouches ? e.changedTouches[0] : e);
  return {x:src.clientX-rect.left, y:src.clientY-rect.top};
}

function hitTest(p, area) {
  return area && p.x>=area.x && p.x<=area.x+area.w && p.y>=area.y && p.y<=area.y+area.h;
}

function getGridSnap() {
  if (!drag.piece) return null;
  const L = layout;
  const pickupT = Math.min((performance.now()-drag.startTime)/140,1);
  const eased = easeOutBack(pickupT);
  const cellS = L.tcs + (L.inner-L.tcs)*eased;
  const csG = cellS + GAP*(cellS/L.inner);
  const yOff = drag.isTouch ? -L.cs*1.8 : 0;
  const originX = drag.x - (drag.piece.cols*csG)/2;
  const originY = drag.y + yOff - (drag.piece.rows*csG)/2;
  return {row:Math.round((originY-L.gy)/L.cs), col:Math.round((originX-L.gx)/L.cs)};
}

function hitTray(px, py) {
  const L = layout;
  for (let i=0;i<3;i++) {
    const piece = state.pieces[i];
    if (!piece) continue;
    const slotX = L.gx + i*L.tsw;
    const cx = slotX + L.tsw/2;
    const cy = L.trayY + L.trayH/2;
    const pw = piece.special ? L.tcs : piece.cols*L.tcs;
    const ph = piece.special ? L.tcs : piece.rows*L.tcs;
    const pad = 22;
    if (px>=cx-pw/2-pad && px<=cx+pw/2+pad && py>=cy-ph/2-pad && py<=cy+ph/2+pad) return i;
  }
  return -1;
}

function onDown(e) {
  e.preventDefault();
  const p = getPointerPos(e);

  switch(screen) {
    case SCR.MENU: {
      // Level mode button
      if (hitTest(p, hitAreas.playLevels)) {
        sfx('click');
        ensureAudio();
        screen = SCR.LEVEL_SELECT;
        levelSelectWorld = 0;
        if (settings.musicOn) { bgmPlay(); }
        return;
      }
      // Endless mode button
      if (hitTest(p, hitAreas.play)) {
        sfx('click');
        ensureAudio();
        gameMode = 'endless';
        currentLevel = null;
        if (!settings.tutorialSeen) {
          screen = SCR.TUTORIAL;
          tutorialStep = 0;
          initState();
        } else {
          screen = SCR.PLAYING;
          initState();
        }
        if (settings.musicOn) { bgmPlay(); }
        return;
      }
      // Leaderboard button
      if (hitTest(p, hitAreas.leaderboard)) {
        sfx('click');
        screen = SCR.LEADERBOARD;
        lbLastFetch = 0; // force refresh
        hitAreas.lineLogin = null;
        return;
      }
      break;
    }
    case SCR.LEVEL_SELECT: {
      // Back button
      if (hitTest(p, hitAreas.lsBack)) {
        sfx('click');
        screen = SCR.MENU;
        menuAnim = performance.now();
        return;
      }
      // World navigation
      if (hitTest(p, hitAreas.lsLeft) && levelSelectWorld > 0) {
        sfx('click');
        levelSelectWorld--;
        return;
      }
      if (hitTest(p, hitAreas.lsRight) && levelSelectWorld < WORLDS.length-1) {
        sfx('click');
        levelSelectWorld++;
        return;
      }
      // Level nodes
      if (hitAreas.levelNodes) {
        for (const node of hitAreas.levelNodes) {
          if (hitTest(p, node) && node.unlocked) {
            sfx('click');
            currentLevel = node.lvl;
            screen = SCR.LEVEL_BRIEF;
            briefAnim = performance.now();
            return;
          }
        }
      }
      break;
    }
    case SCR.LEVEL_CLEAR: {
      // Next level
      if (hitTest(p, hitAreas.lcNext) && currentLevel && currentLevel.id < LEVELS.length) {
        sfx('click');
        currentLevel = LEVELS[currentLevel.id]; // next level (0-indexed array, id is 1-indexed)
        screen = SCR.PLAYING;
        initState();
        return;
      }
      // Replay
      if (hitTest(p, hitAreas.lcReplay)) {
        sfx('click');
        screen = SCR.PLAYING;
        initState();
        return;
      }
      // Back to level select
      if (hitTest(p, hitAreas.lcLevels)) {
        sfx('click');
        screen = SCR.LEVEL_SELECT;
        levelSelectWorld = currentLevel ? Math.floor((currentLevel.id-1)/5) : 0;
        return;
      }
      break;
    }
    case SCR.LEADERBOARD: {
      if (hitTest(p, hitAreas.lbBack)) {
        sfx('click');
        screen = SCR.MENU;
        menuAnim = performance.now();
        return;
      }
      // LINE Login button
      if (!lineUser && hitAreas.lineLogin && hitTest(p, hitAreas.lineLogin)) {
        sfx('click');
        lineLogin();
        return;
      }
      break;
    }
    case SCR.LEVEL_BRIEF: {
      // GO button — start the level
      if (hitTest(p, hitAreas.briefGo)) {
        sfx('click');
        ensureAudio();
        gameMode = 'level';
        screen = SCR.PLAYING;
        initState();
        if (settings.musicOn) { bgmPlay(); }
        return;
      }
      // Back button — return to level select
      if (hitTest(p, hitAreas.briefBack)) {
        sfx('click');
        screen = SCR.LEVEL_SELECT;
        return;
      }
      break;
    }
    case SCR.PLAYING: {
      // Gear button
      if (hitTest(p, hitAreas.gear)) {
        sfx('click');
        screen = SCR.PAUSED;
        return;
      }
      // Undo button
      if (hitTest(p, hitAreas.undo) && !state.undoUsed && state.undoSnap) {
        doUndo();
        return;
      }
      // Tray drag
      if (!state.gameOver) {
        const idx = hitTray(p.x, p.y);
        if (idx >= 0) {
          sfx('tick');
          drag.active = true;
          drag.pieceIdx = idx;
          drag.piece = state.pieces[idx];
          drag.x = p.x;
          drag.y = p.y;
          drag.isTouch = !!e.touches;
          drag.startTime = performance.now();
        }
      }
      break;
    }
    case SCR.PAUSED: {
      // Music toggle
      if (hitTest(p, hitAreas.musicToggle)) {
        sfx('click');
        toggleMusic();
        return;
      }
      // SFX toggle
      if (hitTest(p, hitAreas.sfxToggle)) {
        settings.sfxOn = !settings.sfxOn;
        saveSettings();
        sfx('click');
        return;
      }
      // Resume
      if (hitTest(p, hitAreas.resume)) {
        sfx('click');
        screen = SCR.PLAYING;
        return;
      }
      // Quit
      if (hitTest(p, hitAreas.quit)) {
        sfx('click');
        screen = SCR.MENU;
        menuAnim = 0;
        bgmStop();
        return;
      }
      break;
    }
    case SCR.GAME_OVER: {
      // Rewarded ad — watch ad for +3 moves (level mode only)
      if (hitAreas.rewardAd && hitTest(p, hitAreas.rewardAd)) {
        sfx('click');
        showRewardedAd().then(rewarded => {
          if (rewarded) {
            _adUsedThisRound = true;
            state.movesLeft = 3;
            state.gameOver = false;
            screen = SCR.PLAYING;
          }
        });
        return;
      }
      if (hitTest(p, hitAreas.restart)) {
        sfx('click');
        _adUsedThisRound = false;
        if (gameMode === 'level' && currentLevel) {
          screen = SCR.PLAYING;
          initState();
        } else {
          screen = SCR.PLAYING;
          initState();
        }
      }
      if (hitTest(p, hitAreas.goHome)) {
        sfx('click');
        _adUsedThisRound = false;
        screen = SCR.MENU;
        menuAnim = 0;
        bgmStop();
      }
      break;
    }
    case SCR.TUTORIAL: {
      sfx('click');
      tutorialStep++;
      if (tutorialStep >= TUTORIAL_STEPS.length) {
        settings.tutorialSeen = true;
        saveSettings();
        screen = SCR.PLAYING;
      }
      break;
    }
  }
}

function onMove(e) {
  e.preventDefault();
  if (!drag.active || screen !== SCR.PLAYING) return;
  const p = getPointerPos(e);
  drag.x = p.x;
  drag.y = p.y;
}

function onUp(e) {
  if (e && e.preventDefault) e.preventDefault();
  if (!drag.active || screen !== SCR.PLAYING) return;

  const gp = getGridSnap();
  if (gp && drag.piece && canPlace(drag.piece, gp.row, gp.col)) {
    doPlace(drag.pieceIdx, gp.row, gp.col);
  }
  drag.active = false;
  drag.piece = null;
  drag.pieceIdx = -1;
}

function cancelDrag() {
  drag.active = false;
  drag.piece = null;
  drag.pieceIdx = -1;
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('mouseleave', ()=>{ if(drag.active&&!drag.isTouch) cancelDrag(); });
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onUp, {passive:false});
canvas.addEventListener('touchcancel', onUp, {passive:false});
canvas.addEventListener('contextmenu', e=>e.preventDefault());
window.addEventListener('blur', cancelDrag);
window.addEventListener('resize', resizeCanvas);

// ============================================================
//  GAME LOOP
// ============================================================
function loop(now) {
  render(now);
  requestAnimationFrame(loop);
}

// ============================================================
//  INIT
// ============================================================
loadSettings();
loadLevelProgress();
resizeCanvas();
initState();
menuAnim = performance.now();
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
